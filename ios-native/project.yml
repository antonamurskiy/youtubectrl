name: Vids
options:
  bundleIdPrefix: com.antonamurskiy
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: "86UQNMF8QF"
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "0.1"
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UIBackgroundModes: "audio remote-notification"

targets:
  Vids:
    type: application
    platform: iOS
    sources:
      - path: Vids
        excludes:
          - "Resources/Info.plist"
    resources:
      - path: Vids/Resources/Assets.xcassets
        optional: true
    info:
      path: Vids/Resources/Info.plist
      properties:
        CFBundleDisplayName: Vids
        UIBackgroundModes: [audio, remote-notification]
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSExceptionDomains:
            yuzu.local:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleURLTypes:
          - CFBundleURLSchemes: [youtubectrl]
        UIRequiresFullScreen: false
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.antonamurskiy.vids
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: NO
