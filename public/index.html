<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>YouTubeCtrl</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;touch-action:manipulation}

  :root {
    --bg: #000000;
    --surface: #000000;
    --surface-hover: #111111;
    --border: #1a1a1a;
    --text: #bbbbbb;
    --text-dim: #555555;
    --accent: #bbbbbb;
    --accent2: #ffffff;
    --accent3: #555555;
    --accent-glow: rgba(187, 187, 187, 0.08);
    --accent-soft: rgba(187, 187, 187, 0.04);
    --radius: 0px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --font: 'JetBrains Mono', monospace;
  }

  html { background: var(--bg); }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    font-size: 12px;
    line-height: 1.4;
  }

  body::before, body::after { display: none; }

  .app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: calc(var(--safe-top) + 16px) 16px calc(var(--safe-bottom) + 200px);
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 50;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .logo-icon {
    width: 20px;
    height: 20px;
    border-radius: 0;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { width: 12px; height: 12px; stroke: #000; }

  .logo-text {
    font-family: var(--font);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    background: none;
    -webkit-background-clip: unset;
    -webkit-text-fill-color: unset;
  }

  .logo-text { cursor: pointer; }

  .secret-menu {
    display: none;
    position: fixed;
    top: 90px;
    right: 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    z-index: 600;
    min-width: 180px;
  }

  .secret-menu.open { display: block; }

  .secret-menu-item {
    display: block;
    width: 100%;
    padding: 10px 12px;
    background: none;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 11px;
    text-align: left;
    cursor: pointer;
  }

  .secret-menu-item:last-child { border-bottom: none; }
  .secret-menu-item:active { background: var(--surface-hover); }

  .header-status {
    margin-left: auto;
    font-size: 10px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 0;
    background: #0f0;
    box-shadow: 0 0 6px rgba(0, 255, 0, 0.5);
    animation: pulse-dot 1s step-end infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* ── Search ── */
  .search-wrap {
    position: relative;
    flex: 1;
    margin: 0 12px;
  }

  .search-input {
    width: 100%;
    padding: 6px 10px;
    background: var(--surface);
    border: none;
    border-radius: 0;
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    outline: none;
    transition: border-color 0.1s;
  }

  .search-input::placeholder { color: var(--text-dim); }

  .search-input:focus { border-color: var(--accent2); }

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    pointer-events: none;
  }

  .search-input:focus ~ .search-icon { color: var(--accent2); }

  .search-clear {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 24px;
    height: 24px;
    border-radius: 0;
    background: none;
    border: 1px solid var(--border);
    color: var(--accent2);
    font-size: 14px;
    font-family: var(--font);
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .search-clear.visible { display: flex; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 4px;
  }

  .tab {
    padding: 4px 8px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-dim);
    font-family: var(--font);
    font-weight: 400;
    font-size: 10px;
    cursor: pointer;
  }

  .tab.active {
    background: #111111;
    color: #bbbbbb;
  }

  /* ── Section headings ── */
  .section-label {
    font-family: var(--font);
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .section-label .accent { color: var(--accent); }

  /* ── Video grid ── */
  .video-grid {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .video-card {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    border-radius: 0;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }

  .video-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent-soft);
    opacity: 0;
    pointer-events: none;
  }

  .video-card:active { background: rgba(0, 229, 255, 0.05); }
  .video-card:active::before { opacity: 1; }

  .video-card.playing {
    background: #111;
  }

  .thumb-wrap {
    position: relative;
    flex-shrink: 0;
    width: 120px;
    aspect-ratio: 16/9;
    border-radius: 0;
    overflow: hidden;
    background: #111;
    border: 1px solid var(--border);
  }

  .thumb-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .video-card:active .thumb-wrap img { opacity: 0.8; }

  .watch-progress {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    background: #c00;
  }

  .live-badge {
    position: absolute;
    top: 2px;
    left: 2px;
    background: #bb0000;
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    font-family: var(--font);
    padding: 1px 4px;
    letter-spacing: 1px;
  }

  .sub-badge {
    color: #bb0000;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .duration-badge {
    position: absolute;
    bottom: 2px;
    right: 2px;
    background: #000;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    font-family: var(--font);
    padding: 1px 4px;
    border-radius: 0;
    letter-spacing: 0.5px;
  }

  .video-info {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
    min-width: 0;
    padding: 0;
  }

  .video-title {
    font-size: 12px;
    font-weight: 500;
    font-family: var(--font);
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    color: var(--text);
  }

  .video-channel {
    font-size: 10px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .video-meta {
    font-size: 10px;
    color: var(--text-dim);
  }

  /* ── Play indicator on card ── */
  .play-indicator {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 32px;
    height: 32px;
    border-radius: 0;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    pointer-events: none;
  }

  .play-indicator svg { width: 14px; height: 14px; fill: #000; }

  .video-card.playing .play-indicator {
    animation: pop-in 0.2s ease forwards;
  }

  @keyframes pop-in {
    to { transform: translate(-50%, -50%) scale(1); }
  }

  /* ── Toast ── */
  .fab {
    position: fixed;
    right: 16px;
    width: 48px;
    height: 48px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 101;
  }

  .fab:active { background: var(--surface-hover); color: var(--text); }
  .fab { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }

  .fab-top { top: 56px; }
  .fab-bottom { bottom: 16px; transition: bottom 0.15s; }

  .toast-stack {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    display: flex;
    flex-direction: column-reverse;
    gap: 4px;
    align-items: center;
    pointer-events: none;
  }

  .toast {
    background: #000;
    color: var(--accent);
    font-family: var(--font);
    font-weight: 700;
    font-size: 12px;
    padding: 8px 16px;
    border: 1px solid var(--accent);
    border-radius: 0;
    opacity: 0;
    transform: translateY(20px);
    transition: transform 0.2s ease, opacity 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  /* ── Loading / empty states ── */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 48px 0;
    color: var(--text-dim);
    font-size: 11px;
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid #222;
    border-top-color: var(--accent);
    border-radius: 0;
    animation: spin 0.5s steps(8) infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-dim);
    font-size: 12px;
    line-height: 1.6;
  }

  .empty-state .icon {
    font-size: 24px;
    margin-bottom: 8px;
    opacity: 0.5;
  }

  /* ── Skeleton cards ── */
  .skeleton-card {
    display: flex;
    gap: 10px;
    padding: 8px;
    border: 1px solid #1a1a1a;
  }

  .skeleton-thumb {
    flex-shrink: 0;
    width: 120px;
    aspect-ratio: 16/9;
    background: #111;
    animation: blink 1s step-end infinite;
  }

  .skeleton-lines {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    justify-content: center;
  }

  .skeleton-line {
    height: 10px;
    background: #111;
    animation: blink 1s step-end infinite;
  }

  .skeleton-line:nth-child(1) { width: 90%; }
  .skeleton-line:nth-child(2) { width: 60%; }
  .skeleton-line:nth-child(3) { width: 40%; }

  @keyframes blink { 50% { opacity: 0.3; } }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ── Card entrance ── */

  /* ── Auth button ── */
  .auth-btn {
    margin-left: auto;
    font-family: var(--font);
    font-weight: 700;
    font-size: 10px;
    padding: 5px 10px;
    border-radius: 0;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .auth-btn:active {
    background: var(--accent);
    color: #000;
  }

  .auth-btn.logged-in {
    border-color: #0f0;
    color: #0f0;
    font-size: 10px;
  }

  /* ── Now Playing bar ── */
  .now-playing {
    display: flex;
    flex-direction: column;
    padding: 10px 12px;
    padding-bottom: calc(8px + var(--safe-bottom));
    background: #000;
    border-top: 1px solid var(--accent);
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    max-width: 480px;
    margin: 0 auto;
    z-index: 100;
    gap: 4px;
    overflow: visible;
  }

  .np-top-row {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    min-width: 0;
    overflow: hidden;
  }

  .np-btn-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    width: 100%;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 4px 0;
  }

  .np-btn-row .np-btn {
    flex: 1 1 0;
    height: 36px;
    border: none;
    background: none;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .np-btn-row .np-btn:active { color: var(--text); }
  .np-btn-row .np-btn.active { color: #2d8a4e; }
  .np-btn-row .np-btn-stop { color: var(--text-dim); }

  .np-mute-btn { color: #333 !important; background: none !important; border: none !important; flex: 0 0 auto !important; width: auto !important; padding: 0 4px; }

  .np-volume-row {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
    min-width: 0;
  }

  .np-volume {
    flex: 1;
    min-width: 0;
    height: 18px;
    -webkit-appearance: none;
    appearance: none;
    background:
      repeating-linear-gradient(90deg, transparent, transparent 1px, var(--bg) 1px, var(--bg) 2px),
      repeating-linear-gradient(0deg, transparent, transparent 1px, var(--bg) 1px, var(--bg) 2px),
      #222;
    background-size: 2px 2px, 2px 2px, 100% 100%;
    border-radius: 0;
    outline: none;
  }

  .np-volume::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 0;
    background: #555;
    cursor: pointer;
  }

  .np-volume-vertical {
    writing-mode: vertical-lr;
    direction: rtl;
    width: 20px;
    height: 200px;
    flex: none;
  }

  @keyframes slide-up {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .np-thumb {
    width: 44px;
    height: 25px;
    border-radius: 0;
    background-size: cover;
    background-position: center;
    background-color: #111;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .np-info {
    flex: 1;
    min-width: 0;
    cursor: pointer;
  }

  .np-label {
    font-family: var(--font);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    font-weight: 500;
  }

  .np-title {
    font-size: 11px;
    font-family: var(--font);
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
    flex: 1;
  }

  .np-stop {
    width: 40px;
    height: 40px;
    border-radius: 0;
    border: none;
    outline: none;
    background: none;
    color: var(--accent);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .np-progress-wrap {
    width: 100%;
    margin-top: 4px;
    position: relative;
    height: 48px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .np-time {
    font-size: 13px;
    font-family: var(--font);
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }

  .np-progress-bar {
    flex: 1;
    height: 28px;
    background:
      repeating-linear-gradient(90deg, transparent, transparent 1px, var(--bg) 1px, var(--bg) 2px),
      repeating-linear-gradient(0deg, transparent, transparent 1px, var(--bg) 1px, var(--bg) 2px),
      #222;
    background-size: 2px 2px, 2px 2px, 100% 100%;
    border-radius: 0;
    position: relative;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }

  .np-progress-bar::before {
    content: '';
    position: absolute;
    inset: -12px 0;
  }

  .np-skip-btn {
    width: 36px;
    height: 36px;
    border-radius: 0;
    border: none;
    outline: none;
    background: none;
    color: var(--accent);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-family: var(--font);
  }

  .np-skip-btn:active { background: var(--accent-soft); }

  .np-controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    width: 100%;
  }
  .np-controls .np-progress-bar {
    flex: none;
    width: 100%;
    order: -1;
    margin-bottom: 2px;
  }
  .np-controls .np-sub-row {
    display: flex;
    align-items: center;
    width: 100%;
    gap: 4px;
  }

  .np-progress-fill {
    height: 100%;
    background:
      repeating-linear-gradient(90deg, transparent, transparent 1px, var(--bg) 1px, var(--bg) 2px),
      repeating-linear-gradient(0deg, transparent, transparent 1px, var(--bg) 1px, var(--bg) 2px),
      #778;
    background-size: 2px 2px, 2px 2px, 100% 100%;
    width: 0%;
    pointer-events: none;
  }

  .np-progress-thumb {
    position: absolute;
    top: 0;
    width: 6px;
    height: 100%;
    background: #aab;
    pointer-events: none;
    left: 0%;
    transform: translateX(-50%);
  }

  .np-progress-thumb.playing {
    animation: pulse-red 2s ease-in-out infinite;
  }

  .np-current-pos {
    position: absolute;
    top: 0;
    width: 2px;
    height: 100%;
    background: #fff;
    pointer-events: none;
    left: 0%;
    transform: translateX(-50%);
    opacity: 0;
    transition: opacity 1.5s ease;
  }
  .np-current-pos.visible { opacity: 0.6; transition: none; }

  @keyframes pulse-red {
    0%, 100% { background: #bb0000; }
    50% { background: #ff2222; }
  }

  .seek-preview {
    position: absolute;
    bottom: 100%;
    transform: translateX(-50%);
    pointer-events: none;
    display: none;
    flex-direction: column;
    align-items: center;
    margin-bottom: 8px;
    z-index: 100;
  }
  .seek-preview.visible { display: flex; }
  .seek-preview-thumb {
    width: 200px;
    height: 112px;
    background: #111;
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 2px;
  }
  .seek-preview-thumb img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .seek-preview-time {
    background: #000;
    color: #fff;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 700;
    padding: 4px 8px;
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  .seek-preview-chapter {
    background: #000;
    color: var(--accent2);
    font-family: var(--font);
    font-size: 11px;
    padding: 2px 8px;
    border: 1px solid var(--border);
    border-top: none;
    white-space: nowrap;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Comments panel ── */
  .comments-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    max-width: 480px;
    margin: 0 auto;
    max-height: 70vh;
    background: #000;
    border-top: 1px solid var(--accent);
    z-index: 200;
    display: flex;
    flex-direction: column;
    animation: slide-up 0.2s ease;
  }

  .comments-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    font-family: var(--font);
    font-weight: 700;
    font-size: 12px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .comments-close {
    background: none;
    border: none;
    color: var(--accent2);
    font-size: 18px;
    font-family: var(--font);
    cursor: pointer;
  }

  .comments-list {
    overflow-y: auto;
    padding: 10px 12px;
    flex: 1;
  }

  .comment {
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid #1a1a1a;
  }

  .comment-author {
    font-size: 10px;
    font-weight: 700;
    color: var(--accent2);
    margin-bottom: 2px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .comment-text {
    font-size: 11px;
    color: var(--text);
    line-height: 1.5;
  }

  .comment-meta {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .comments-loading {
    text-align: center;
    padding: 24px;
    color: var(--text-dim);
    font-size: 11px;
  }

  /* ── Desktop layout ── */
  @media (min-width: 768px) {
    .app {
      max-width: 1200px;
      padding: 16px 24px calc(var(--safe-bottom) + 120px);
    }

    .now-playing { max-width: 1200px; }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .video-card {
      flex-direction: column;
      gap: 8px;
      padding: 0;
      border-bottom: none;
    }

    .video-card::before { display: none; }
    .video-card:hover { background: var(--surface-hover); }

    .thumb-wrap {
      width: 100%;
    }

    .thumb-wrap:hover img {

      padding: 0 2px;
    }

    .video-title {
      font-size: 13px;
      -webkit-line-clamp: 2;
    }

    .now-playing {
    }

    .comments-panel {
      max-width: 1200px;
    }
  }
</style>
</head>
<body>

<div class="app">
  <header class="header" style="position:relative">
    <span class="logo-text" onclick="const m=document.getElementById('secretMenu');m.classList.toggle('open');const pp=document.getElementById('phonePlayer');if(pp)pp.style.display=m.classList.contains('open')?'none':''">ytctrl</span>
    <div class="secret-menu" id="secretMenu">
      <div class="secret-menu-item" id="volArea" style="position:relative;height:200px;padding:0;cursor:pointer;touch-action:none;user-select:none;-webkit-user-select:none;">
        <div id="volFill" style="position:absolute;bottom:0;left:0;right:0;background:#333;pointer-events:none;"></div>
        <div id="volLabel" style="position:absolute;bottom:8px;left:0;right:0;text-align:center;font-family:var(--font);font-size:10px;color:var(--text-dim);pointer-events:none;"></div>
      </div>
      <button class="secret-menu-item" id="npMute" onclick="toggleMute()"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter" style="vertical-align:middle"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg> Mute</button>
      <button class="secret-menu-item" onclick="toggleResolution()">Toggle resolution</button>
    </div>
    <div class="tabs" id="tabs">
      <button class="tab active" data-tab="home">Home</button>
      <button class="tab" data-tab="live">Live</button>
      <button class="tab" data-tab="history">History</button>
    </div>
    <div class="search-wrap">
      <input
        class="search-input"
        id="searchInput"
        type="text"
        placeholder="Search"
        autocomplete="off"
        enterkeyhint="search"
      >
      <button class="search-clear" id="searchClear" aria-label="Clear">&times;</button>
    </div>
  </header>

  <div id="sectionLabel" class="section-label" style="display:none"><span class="accent">//</span> Trending</div>
  <div id="videoGrid" class="video-grid"></div>
  <div class="loading" id="loadMore" style="display:none"><div class="spinner"></div></div>
</div>

  <div class="now-playing" id="nowPlaying" style="display:none">
  <div class="np-btn-row">
    <button class="np-btn" id="btnLaptop" onclick="moveMonitor('laptop')"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="2" y1="20" x2="22" y2="20"/></svg></button>
    <button class="np-btn" id="btnLg" onclick="moveMonitor('lg')"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></button>
    <button class="np-btn" id="btnMaximize" onclick="toggleMaximize()"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><rect x="3" y="3" width="18" height="18" rx="2"/></svg></button>
    <button class="np-btn" id="btnFullscreen" onclick="toggleFullscreen()"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button>
    <button class="np-btn" id="btnPhone" onclick="watchOnPhone()"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg></button>
    <button class="np-btn" onclick="toggleComments()" id="npComments"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
    <button class="np-btn np-btn-stop" onclick="stopPlayback()"><svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg></button>
  </div>
  <div class="np-top-row">
    <div class="np-thumb" id="npThumb" onclick="togglePlayPause()"></div>
    <div class="np-info" onclick="togglePlayPause()">
      <div class="np-label" id="npLabel">Now playing</div>
      <div class="np-title" id="npTitle"></div>
    </div>
    <button class="np-stop" id="npPlayPause" onclick="togglePlayPause()">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
    </button>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>

<button class="fab fab-top" onclick="const m=document.getElementById('secretMenu');m.classList.toggle('open');const pp=document.getElementById('phonePlayer');if(pp)pp.style.display=m.classList.contains('open')?'none':''">
  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>
<button class="fab fab-bottom" id="fabRefresh" onclick="refreshFeed()">
  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/></svg>
</button>

<script>
  const grid = document.getElementById('videoGrid');
  const input = document.getElementById('searchInput');
  const clearBtn = document.getElementById('searchClear');
  const label = document.getElementById('sectionLabel');
  const toastStack = document.getElementById('toastStack');

  // Event delegation for video card clicks (one handler for all cards)
  grid.addEventListener('click', (e) => {
    if (document.getElementById('cardMenu')) return;
    const card = e.target.closest('.video-card');
    if (card) playVideo(card);
  });

  const authBtn = document.getElementById('authBtn');
  const npBar = document.getElementById('nowPlaying');
  const npThumb = document.getElementById('npThumb');
  const npTitle = document.getElementById('npTitle');
  const loadMoreEl = document.getElementById('loadMore');

  let searchTimeout = null;
  let currentlyPlaying = null;
  let nowPlayingUrl = null;
  let isLoggedIn = false;
  let pollInterval = null;
  let currentTab = 'home';
  let nextPageToken = null;
  let isLoadingMore = false;
  let currentQuery = '';

  // ── Render helpers ──

  function formatViews(n) {
    if (!n) return '';
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1).replace(/\.0$/, '') + 'M views';
    if (n >= 1_000) return (n / 1_000).toFixed(1).replace(/\.0$/, '') + 'K views';
    return n + ' views';
  }

  function showSkeletons() {
    grid.innerHTML = Array.from({ length: 6 }, () => `
      <div class="skeleton-card">
        <div class="skeleton-thumb"></div>
        <div class="skeleton-lines">
          <div class="skeleton-line"></div>
          <div class="skeleton-line"></div>
          <div class="skeleton-line"></div>
        </div>
      </div>
    `).join('');
  }

  function renderVideos(videos) {
    if (!videos.length) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="icon">:/</div>
          No results found. Try a different search.
        </div>`;
      return;
    }

    // Clear hover intervals before replacing DOM
    grid.querySelectorAll('.video-card').forEach(c => { if (c._hoverInterval) clearInterval(c._hoverInterval); });

    grid.innerHTML = videos.map((v, i) => {
      const hasProg = v.savedPosition > 0 && v.savedDuration > 0;
      const pct = hasProg ? Math.min(100, (v.savedPosition / v.savedDuration) * 100) : 0;
      return `
      <div class="video-card" data-url="${v.url}" data-channel="${escapeHtml(v.channel || '')}" data-channel-id="${v.channelId || ''}" >
        <div class="thumb-wrap">
          <img src="${v.thumbnail}" alt="${escapeHtml(v.title || '')}" loading="lazy">
          ${v.live ? '<span class="live-badge">LIVE</span>' : v.upcoming ? '<span class="live-badge" style="background:#555">SOON</span>' : ''}${v.duration && !v.upcoming ? `<span class="duration-badge">${v.duration}</span>` : ''}
          ${hasProg ? `<div class="watch-progress" style="width:${pct}%"></div>` : ''}
        </div>
        <div class="video-info">
          <div class="video-title">${escapeHtml(v.title)}</div>
          ${v.channel ? `<div class="video-channel">${v.subscribed ? '<span class="sub-badge">SUB</span> ' : ''}${escapeHtml(v.channel)}</div>` : ''}
          <div class="video-meta">${v.concurrentViewers ? formatViews(v.concurrentViewers).replace(' views', ' watching') : formatViews(v.views)}${v.uploadedAt ? ` · ${v.uploadedAt}` : ''}${hasProg ? ` · ${fmtTime(v.savedPosition)} watched` : ''}</div>
        </div>
        <div class="play-indicator">
          <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
      </div>
    `}).join('');

    // Highlight currently playing
    grid.querySelectorAll('.video-card').forEach(card => {
      if (nowPlayingUrl && card.dataset.url === nowPlayingUrl) {
        card.classList.add('playing');
        currentlyPlaying = card;
      }
    });
  }

  function appendVideos(videos) {
    const start = grid.querySelectorAll('.video-card').length;
    const html = videos.map((v, i) => `
      <div class="video-card" data-url="${v.url}" data-channel="${escapeHtml(v.channel || '')}" data-channel-id="${v.channelId || ''}" >
        <div class="thumb-wrap">
          <img src="${v.thumbnail}" alt="${escapeHtml(v.title || '')}" loading="lazy">
          ${v.live ? '<span class="live-badge">LIVE</span>' : v.upcoming ? '<span class="live-badge" style="background:#555">SOON</span>' : ''}${v.duration && !v.upcoming ? `<span class="duration-badge">${v.duration}</span>` : ''}
        </div>
        <div class="video-info">
          <div class="video-title">${escapeHtml(v.title)}</div>
          ${v.channel ? `<div class="video-channel">${escapeHtml(v.channel)}</div>` : ''}
          <div class="video-meta">${formatViews(v.views)}${v.uploadedAt ? ` · ${v.uploadedAt}` : ''}</div>
        </div>
        <div class="play-indicator">
          <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
      </div>
    `).join('');
    grid.insertAdjacentHTML('beforeend', html);
  }

  window.copyText = function(text) {
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(text).then(() => showToast('Copied')).catch(() => copyFallback(text));
    } else copyFallback(text);
    document.getElementById('cardMenu')?.remove();
  };
  function copyFallback(text) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;left:-9999px';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); ta.remove();
    showToast('Copied');
  }

  function escapeHtml(str) {
    const el = document.createElement('span');
    el.textContent = str;
    return el.innerHTML;
  }

  // ── API calls ──

  let homePage = 0;
  let homeHasMore = false;
  let loadGen = 0; // generation counter to discard stale responses

  async function loadHome(refresh) {
    const gen = ++loadGen;
    showSkeletons();
    label.innerHTML = `<span class="accent">//</span> Home`;
    homePage = 0;
    try {
      const res = await fetch('/api/home?page=0' + (refresh ? '&refresh=1' : ''));
      if (gen !== loadGen) return;
      if (!res.ok) throw new Error('no home');
      const data = await res.json();
      if (gen !== loadGen) return;
      if (!data.videos?.length) throw new Error('empty');
      homeHasMore = data.hasMore;
      renderVideos(data.videos);
    } catch {
      if (gen !== loadGen) return;
      label.innerHTML = `<span class="accent">//</span> Trending`;
      loadTrending(true);
    }
  }

  async function loadMoreHome() {
    if (!homeHasMore || isLoadingMore) return;
    isLoadingMore = true;
    homePage++;
    loadMoreEl.style.display = 'flex';
    try {
      const res = await fetch('/api/home?page=' + homePage);
      const data = await res.json();
      if (data.videos?.length) appendVideos(data.videos);
      homeHasMore = data.hasMore;
    } catch {}
    loadMoreEl.style.display = 'none';
    isLoadingMore = false;
  }

  async function loadTrending(skipSkeleton) {
    const gen = ++loadGen;
    if (!skipSkeleton) showSkeletons();
    try {
      const res = await fetch('/api/trending');
      if (gen !== loadGen) return;
      const data = await res.json();
      if (gen !== loadGen) return;
      renderVideos(data);
    } catch {
      if (gen !== loadGen) return;
      grid.innerHTML = `
        <div class="empty-state">
          <div class="icon">!</div>
          Couldn't load trending videos.<br>Check that the server is running.
        </div>`;
    }
  }

  async function search(query, append) {
    const gen = append ? loadGen : ++loadGen;
    if (!append) { showSkeletons(); currentQuery = query; nextPageToken = null; }
    else { loadMoreEl.style.display = 'flex'; }
    label.innerHTML = `<span class="accent">//</span> Results`;
    try {
      let url = '/api/search?q=' + encodeURIComponent(query);
      if (append && nextPageToken) url += '&pageToken=' + nextPageToken;
      const res = await fetch(url);
      if (gen !== loadGen) return;
      const data = await res.json();
      if (gen !== loadGen) return;
      const videos = data.videos || data;
      nextPageToken = data.nextPageToken || null;
      if (append) appendVideos(videos);
      else renderVideos(videos);
    } catch {
      if (gen !== loadGen) return;
      if (!append) grid.innerHTML = `
        <div class="empty-state">
          <div class="icon">!</div>
          Search failed. Try again.
        </div>`;
    }
    loadMoreEl.style.display = 'none';
    isLoadingMore = false;
  }

  async function playVideo(card) {
    const url = card.dataset.url;
    if (!url) return;

    const hadPhonePlayer = !!document.getElementById('phonePlayer');

    // Visual feedback
    if (currentlyPlaying) currentlyPlaying.classList.remove('playing');
    card.classList.add('playing');
    currentlyPlaying = card;
    nowPlayingUrl = url;

    // Detect if live from badge
    const isLive = !!card.querySelector('.live-badge');

    // Show toast
    showToast('Playing on computer');

    const title = card.querySelector('.video-title')?.textContent || '';
    const channel = card.dataset.channel || '';

    try {
      // Pass watch percentage for cross-device resume (YouTube history)
      const progressBar = card.querySelector('.watch-progress');
      const watchPct = progressBar ? parseFloat(progressBar.style.width) || 0 : 0;
      const res = await fetch('/api/play', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, isLive, title, channel, watchPct })
      });
      if (!res.ok) showToast('Failed to play');
      else {
        activateMediaSession(title, channel, url);
        startPolling();
        // Swap phone player feed if active — re-hide mpv video
        if (hadPhonePlayer) {
          setTimeout(async () => {
            try {
              fetch('/api/mpv-video', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ hidden: true }) });
              const d = await fetch('/api/watch-on-phone', { method: 'POST' }).then(r => r.json());
              const vid = document.getElementById('phoneVideo');
              if (vid && d.streamUrl) {
                vid.src = d.streamUrl;
                vid.currentTime = d.seconds || 0;
                vid.play().catch(() => {});
              }
            } catch {}
          }, 2000);
        }
      }
    } catch {
      showToast('Connection error');
    }
  }

  function showToast(msg) {
    const np = document.getElementById('nowPlaying');
    const offset = np && np.style.display !== 'none' ? np.offsetHeight : 0;
    toastStack.style.bottom = (offset + 8) + 'px';
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    toastStack.appendChild(el);
    requestAnimationFrame(() => el.classList.add('show'));
    setTimeout(() => {
      el.classList.remove('show');
      setTimeout(() => el.remove(), 200);
    }, 1500);
  }

  // ── Now Playing ──

  function fmtTime(s) {
    if (!s || !isFinite(s)) return '0:00';
    s = Math.floor(s);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    return `${m}:${String(sec).padStart(2,'0')}`;
  }

  function startPolling() {
    stopPolling();
    pollInterval = 'active';
    pollPlayback();
  }

  function stopPolling() {
    if (pollInterval) { clearTimeout(pollInterval); pollInterval = null; }
  }

  function schedulePoll(ms) {
    if (pollInterval) pollInterval = setTimeout(pollPlayback, ms || 1000);
  }

  // Slow down polling when tab is hidden (keep it alive for lock screen controls)
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      stopPolling();
      // Keep phone sync interval running (it no-ops when vid is paused in background)
      // Keep slow poll for media session position updates on lock screen
      if (mediaSessionActive && nowPlayingUrl) {
        pollInterval = 'active';
        schedulePoll(5000);
      }
    } else if (nowPlayingUrl) {
      startPolling();
      // Re-sync phone video immediately after returning from background
      const vid = document.getElementById('phoneVideo');
      if (vid && !vid.paused) {
        fetch('/api/playback').then(r => r.json()).then(pb => {
          if (pb.position) vid.currentTime = pb.position;
        }).catch(() => {});
      }
    }
  });

  let controlsBuilt = false;
  let isSeeking = false;
  let seekTarget = null; // position we seeked to, cleared when poll confirms it

  // ── Media Session (lock screen controls) ──
  // Short looping near-silent audio triggers iOS Now Playing widget
  const silentAudio = new Audio('/silent.m4a');
  silentAudio.volume = 1;
  const hasMediaSession = 'mediaSession' in navigator;
  let mediaSessionActive = false;
  let lastVideoPos = 0;
  let lastVideoDur = 0;

  // Manually restart instead of loop — set position state BEFORE restarting to prevent flash to 0
  silentAudio.addEventListener('ended', () => {
    if (!mediaSessionActive) return;
    if (hasMediaSession && lastVideoDur > 0) {
      try {
        navigator.mediaSession.setPositionState({
          duration: lastVideoDur,
          playbackRate: 1,
          position: Math.max(0, Math.min(lastVideoPos, lastVideoDur))
        });
      } catch {}
    }
    silentAudio.currentTime = 0;
    silentAudio.play().catch(() => {});
  });

  // Register action handlers once at startup
  if (hasMediaSession) {
    navigator.mediaSession.setActionHandler('play', () => {
      fetch('/api/playpause', { method: 'POST' });
      silentAudio.play().catch(() => {});
      navigator.mediaSession.playbackState = 'playing';
    });
    navigator.mediaSession.setActionHandler('pause', () => {
      fetch('/api/playpause', { method: 'POST' });
      silentAudio.pause();
      navigator.mediaSession.playbackState = 'paused';
    });
    navigator.mediaSession.setActionHandler('seekbackward', () => {
      fetch('/api/seek-relative', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ offset: -10 }) });
    });
    navigator.mediaSession.setActionHandler('seekforward', () => {
      fetch('/api/seek-relative', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ offset: 10 }) });
    });
    navigator.mediaSession.setActionHandler('stop', () => {
      window.stopPlayback();
    });
    navigator.mediaSession.setActionHandler('seekto', (details) => {
      if (details.seekTime != null) {
        lastVideoPos = details.seekTime;
        try {
          navigator.mediaSession.setPositionState({
            duration: lastVideoDur,
            playbackRate: 1,
            position: Math.max(0, Math.min(details.seekTime, lastVideoDur))
          });
        } catch {}
        fetch('/api/seek', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ position: details.seekTime }) });
      }
    });
  }

  function activateMediaSession(title, channel, videoUrl) {
    if (!hasMediaSession || !('ontouchstart' in window)) return;
    silentAudio.play().catch(() => {});
    mediaSessionActive = true;
    updateMediaSessionMetadata(title, channel, videoUrl);
    // Set initial position immediately so iOS doesn't show the silent audio's own 0:00/5:00
    if (lastVideoDur > 0) {
      try {
        navigator.mediaSession.setPositionState({
          duration: lastVideoDur,
          playbackRate: 1,
          position: Math.max(0, Math.min(lastVideoPos, lastVideoDur))
        });
      } catch {}
    }
  }

  function updateMediaSessionMetadata(title, channel, videoUrl) {
    if (!hasMediaSession) return;
    const m = (videoUrl || '').match(/v=([\w-]+)/);
    const artwork = m ? [
      { src: `https://i.ytimg.com/vi/${m[1]}/hqdefault.jpg`, sizes: '480x360', type: 'image/jpeg' },
    ] : [];
    navigator.mediaSession.metadata = new MediaMetadata({
      title: title || 'YouTubeCtrl',
      artist: channel || '',
      album: 'YouTubeCtrl',
      artwork
    });
    navigator.mediaSession.playbackState = 'playing';
  }

  function updateMediaSessionPosition(position, duration, paused) {
    if (!mediaSessionActive || !hasMediaSession) return;
    lastVideoPos = position || 0;
    lastVideoDur = duration || 0;
    navigator.mediaSession.playbackState = paused ? 'paused' : 'playing';
    if (duration > 0 && isFinite(duration) && isFinite(position)) {
      try {
        navigator.mediaSession.setPositionState({
          duration: duration,
          playbackRate: 1,
          position: Math.max(0, Math.min(position, duration))
        });
      } catch {}
    }
  }

  function deactivateMediaSession() {

      const dur = parseFloat(bar?.dataset.duration || 0);
      const rect = bar?.getBoundingClientRect();
      if (rect && dur > 0) {
        const pct = Math.max(0, Math.min(1, (e.changedTouches[0].clientX - rect.left) / rect.width));

      }
      window._scrubSendSeek(e.changedTouches[0].clientX);

  async function pollPlayback() {
    try {
      const ac = new AbortController();
      const t = setTimeout(() => ac.abort(), 5000);
      const res = await fetch('/api/playback', { signal: ac.signal });

      const data = await res.json();
      if (data.playing && data.duration > 0) {
        npBar.style.display = 'flex';
        setTimeout(updateFabPosition, 50);
        npBar.style.flexWrap = 'wrap';
        if (data.url) nowPlayingUrl = data.url;
        document.getElementById('npLabel').textContent = data.channel || 'Now playing';

        document.querySelectorAll('#btnLaptop,#btnLg,#btnMaximize,#btnFullscreen,#btnPhone').forEach(b => b.classList.remove('active'));

        if (document.getElementById('phonePlayer')) document.getElementById('btnPhone')?.classList.add('active');

        // Sync play/pause icon (only update DOM when state changes)
        const ppBtn = document.getElementById('npPlayPause');

        }
        const thumbDot = document.getElementById('npThumbDot');

        }
        const m = (data.url || '').match(/v=([\w-]+)/);
        if (m) npThumb.style.backgroundImage = `url(https://i.ytimg.com/vi/${m[1]}/default.jpg)`;

        if (!controlsBuilt) {
          controlsBuilt = true;
          const old = npBar.querySelector('.np-controls');

            <div class="np-progress-bar" id="npProgressBar">

            </div>

              </button>
              <span class="np-time" id="npTimePos">0:00</span>
              <span style="flex:1"></span>

              <button class="np-skip-btn" id="npSkipFwd">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter"><polyline points="13 17 18 12 13 7"/></svg>

          controls.querySelector('#npSkipBack').addEventListener('click', () => {

          controls.querySelector('#npSkipFwd').addEventListener('click', () => {
            fetch('/api/seek-relative', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ offset: 10 }) });
            showToast('+10s');
          });

          const bar = controls.querySelector('#npProgressBar');
          let seekTimer = null;
          // storyboard data stored in window._storyboardData by poll

          function updateBarVisual(clientX) {
            const rect = bar.getBoundingClientRect();
            const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
            const fill = document.getElementById('npFill');
            const thumb = document.getElementById('npThumbDot');
            const dur = parseFloat(bar.dataset.duration || 0);
            if (fill) fill.style.width = (pct * 100) + '%';
            if (thumb) thumb.style.left = (pct * 100) + '%';

            // Show seek preview bubble
            const preview = document.getElementById('seekPreview');
            const previewTime = document.getElementById('seekPreviewTime');
            const previewThumb = document.getElementById('seekPreviewThumb');
            if (preview) {
              preview.classList.add('visible');
              // Clamp position so bubble doesn't go off-screen
              const barW = rect.width;
              const bubbleW = 200;
              const minPct = (bubbleW / 2) / barW;
              const maxPct = 1 - minPct;
              const clampedPct = Math.max(minPct, Math.min(maxPct, pct));
              preview.style.left = (clampedPct * 100) + '%';
              if (previewTime && dur) {
                previewTime.textContent = fmtTime(pct * dur);
              }
              // Show storyboard thumbnail if available
              if (previewThumb) {
                previewThumb.innerHTML = '';
                previewThumb.style.display = '';
                const sb = window._storyboardData;
                if (sb && sb.url && dur > 0) {
                  const seekTime = pct * dur;
                  const frameIdx = Math.floor(seekTime / sb.interval);
                  const perPage = sb.cols * sb.rows;
                  const page = Math.floor(frameIdx / perPage);
                  const localIdx = frameIdx % perPage;
                  const col = localIdx % sb.cols;
                  const row = Math.floor(localIdx / sb.cols);
                  const imgUrl = sb.url.replace('$M', String(page));
                  const bgX = sb.cols > 1 ? (col / (sb.cols - 1)) * 100 : 0;
                  const bgY = sb.rows > 1 ? (row / (sb.rows - 1)) * 100 : 0;
                  previewThumb.style.cssText = `width:200px;height:112px;background:url('${imgUrl}') no-repeat;background-size:${sb.cols * 100}% ${sb.rows * 100}%;background-position:${bgX}% ${bgY}%`;
                } else {
                  previewThumb.style.display = 'none';
                }
              }
              // Show chapter name
              const chapterEl = document.getElementById('seekPreviewChapter');
              if (chapterEl) {
                const sb = window._storyboardData;
                const seekTime = pct * dur;
                const ch = sb?.chapters?.find(c => seekTime >= c.start && seekTime < c.end);
                if (ch) { chapterEl.textContent = ch.title; chapterEl.style.display = ''; }
                else { chapterEl.style.display = 'none'; }
              }
            }
            return pct;
          }

          function showSeekPreviewAt(clientX, barEl) {
            const rect = barEl.getBoundingClientRect();
            const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
            const dur = parseFloat(barEl.dataset.duration || 0);
            const preview = document.getElementById('seekPreview');
            const previewTime = document.getElementById('seekPreviewTime');
            const previewThumb = document.getElementById('seekPreviewThumb');
            if (!preview) return;
            preview.classList.add('visible');
            const barW = rect.width;
            const bubbleW = 200;
            const minPct = (bubbleW / 2) / barW;
            const maxPct = 1 - minPct;
            preview.style.left = (Math.max(minPct, Math.min(maxPct, pct)) * 100) + '%';
            if (previewTime && dur) previewTime.textContent = fmtTime(pct * dur);
            if (previewThumb) {
              previewThumb.innerHTML = '';
              const sb = window._storyboardData;
              if (sb && sb.url && dur > 0) {
                previewThumb.style.display = '';
                const seekTime = pct * dur;
                const frameIdx = Math.floor(seekTime / sb.interval);
                const perPage = sb.cols * sb.rows;
                const page = Math.floor(frameIdx / perPage);
                const localIdx = frameIdx % perPage;
                const col = localIdx % sb.cols;
                const row = Math.floor(localIdx / sb.cols);
                const imgUrl = sb.url.replace('$M', String(page));
                const bgX = sb.cols > 1 ? (col / (sb.cols - 1)) * 100 : 0;
                const bgY = sb.rows > 1 ? (row / (sb.rows - 1)) * 100 : 0;
                previewThumb.style.cssText = `width:200px;height:112px;background:url('${imgUrl}') no-repeat;background-size:${sb.cols * 100}% ${sb.rows * 100}%;background-position:${bgX}% ${bgY}%`;
              } else {
                previewThumb.style.display = 'none';
              }
            }
            const chapterEl = document.getElementById('seekPreviewChapter');
            if (chapterEl) {
              const sb = window._storyboardData;
              const seekTime = pct * dur;
              const ch = sb?.chapters?.find(c => seekTime >= c.start && seekTime < c.end);
              if (ch) { chapterEl.textContent = ch.title; chapterEl.style.display = ''; }
              else { chapterEl.style.display = 'none'; }
            }
          }

          function hideSeekPreview() {
            const preview = document.getElementById('seekPreview');
            if (preview) preview.classList.remove('visible');
          }
          function sendSeek(clientX) {
            const pct = updateBarVisual(clientX);
            const dur = parseFloat(bar.dataset.duration || 0);
            if (dur > 0) {
              clearTimeout(seekTimer);
              seekTimer = setTimeout(() => {
                fetch('/api/seek', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ position: pct * dur })
                });
              }, 150);
            }
          }
          bar.addEventListener('click', (e) => { sendSeek(e.clientX); });
          // Desktop: show preview on hover (without moving the scrubber)
          bar.addEventListener('mousemove', (e) => {
            if (!isSeeking) showSeekPreviewAt(e.clientX, bar);
          });
          bar.addEventListener('mouseleave', () => { hideSeekPreview(); });
          // Mobile: show preview during drag
          bar.addEventListener('touchstart', (e) => {
            e.preventDefault(); window._scrubDragging = true; isSeeking = true;
            window._scrubSendSeek = sendSeek;
            window._scrubUpdateBar = updateBarVisual;
            window._scrubHidePreview = hideSeekPreview;
            // Show current position marker at where playback is
            const curPos = document.getElementById('npCurrentPos');
            const fill = document.getElementById('npFill');
            if (curPos && fill) {
              curPos.style.left = fill.style.width;
              curPos.classList.add('visible');
            }
            updateBarVisual(e.touches[0].clientX);
          });
        }

        // Clear isSeeking once server confirms position is near the seek target
        if (isSeeking && seekTarget !== null && data.position > 0) {
          if (Math.abs(data.position - seekTarget) < 3) { isSeeking = false; seekTarget = null; }
        }
        if (!isSeeking) {
          const barEl = document.getElementById('npProgressBar');
          const fill = document.getElementById('npFill');
          const thumb = document.getElementById('npThumbDot');
          const posEl = document.getElementById('npTimePos');
          const pct = data.duration > 0 ? Math.min(100, (data.position / data.duration) * 100) : 0;
          if (fill) fill.style.width = pct + '%';
          if (thumb) thumb.style.left = pct + '%';
          if (data.isLive) {
            const behind = data.duration - data.position;
            if (posEl) posEl.textContent = behind < 5 ? 'LIVE' : '-' + fmtTime(behind);
          } else {
            if (posEl) posEl.textContent = fmtTime(data.position);
          }
          if (barEl) barEl.dataset.duration = data.duration;
          // Store videoId for storyboard preview
          const vm = (data.url || '').match(/v=([\w-]+)/);
          if (barEl && vm) {
            if (barEl.dataset.videoId !== vm[1]) {
              barEl.dataset.videoId = vm[1];
              // Fetch storyboard for this video (non-blocking)
              if (!data.isLive) {
                fetch('/api/storyboard?videoId=' + vm[1]).then(r => r.json()).then(sb => {
                  if (sb.url || sb.chapters?.length) window._storyboardData = sb;
                  else window._storyboardData = null;
                }).catch(() => { window._storyboardData = null; });
              } else {
                window._storyboardData = null;
              }
            }
          }
        }
        const durEl = document.getElementById('npTimeDur');
        if (durEl) {
          if (data.isLive) {
            if (!durEl._liveBtn) {
              durEl.innerHTML = '<span style="color:#e33;cursor:pointer;font-weight:700">LIVE</span>';
              durEl._liveBtn = true;
              durEl._liveHandler = () => {
                const d = parseFloat(document.getElementById('npProgressBar')?.dataset.duration || 0);
                if (d > 0) fetch('/api/seek', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ position: d }) });
                showToast('Going live');
              };
              durEl.addEventListener('click', durEl._liveHandler);
            }
          } else {
            if (durEl._liveHandler) { durEl.removeEventListener('click', durEl._liveHandler); durEl._liveHandler = null; }
            durEl._liveBtn = false;
            durEl.textContent = fmtTime(data.duration);
          }
        }
        if (!isSeeking) {
          const barEl2 = document.getElementById('npProgressBar');
          if (barEl2) barEl2.dataset.duration = data.duration;
        }

        // Sync watch progress on video card in grid
        if (data.url && data.position > 0 && data.duration > 0) {
          const vid = (data.url.match(/v=([\w-]+)/) || [])[1];
          const card = vid && document.querySelector(`.video-card[data-url*="${vid}"]`);
          if (card) {
            const pct = Math.min(100, (data.position / data.duration) * 100);
            let bar = card.querySelector('.watch-progress');
            if (!bar) {
              bar = document.createElement('div');
              bar.className = 'watch-progress';
              card.querySelector('.thumb-wrap')?.appendChild(bar);
            }
            bar.style.width = pct + '%';
          }
        }
        // Update lock screen media session position
        updateMediaSessionPosition(data.position, data.duration, data.paused);
        // Activate media session if not yet active (e.g. reconnecting to existing playback)
        if (!mediaSessionActive && data.title) {
          activateMediaSession(data.title, data.channel || '', data.url || '');
        }
      } else if (!data.playing) {
        hideNowPlaying();
        deactivateMediaSession();
        stopPolling();
        return; // don't schedule next poll
      }
    } catch {}
    schedulePoll(document.hidden ? 5000 : 1000);
  }
