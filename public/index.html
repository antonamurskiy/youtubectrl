<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>YouTubeCtrl</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;touch-action:manipulation}

  :root {
    --bg: #000000;
    --surface: #000000;
    --surface-hover: #111111;
    --border: #1a1a1a;
    --text: #bbbbbb;
    --text-dim: #555555;
    --accent: #bbbbbb;
    --accent2: #ffffff;
    --accent3: #555555;
    --accent-glow: rgba(187, 187, 187, 0.08);
    --accent-soft: rgba(187, 187, 187, 0.04);
    --radius: 0px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --font: 'JetBrains Mono', monospace;
  }

  html { background: var(--bg); }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    font-size: 12px;
    line-height: 1.4;
  }

  body::before, body::after { display: none; }

  .app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: calc(var(--safe-top) + 16px) 16px calc(var(--safe-bottom) + 200px);
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .logo-icon {
    width: 20px;
    height: 20px;
    border-radius: 0;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { width: 12px; height: 12px; stroke: #000; }

  .logo-text {
    font-family: var(--font);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    background: none;
    -webkit-background-clip: unset;
    -webkit-text-fill-color: unset;
  }

  .logo-text { cursor: pointer; }

  .secret-menu {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    margin-top: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    z-index: 100;
    min-width: 180px;
  }

  .secret-menu.open { display: block; }

  .secret-menu-item {
    display: block;
    width: 100%;
    padding: 10px 12px;
    background: none;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 11px;
    text-align: left;
    cursor: pointer;
  }

  .secret-menu-item:last-child { border-bottom: none; }
  .secret-menu-item:active { background: var(--surface-hover); }

  .header-status {
    margin-left: auto;
    font-size: 10px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 0;
    background: #0f0;
    box-shadow: 0 0 6px rgba(0, 255, 0, 0.5);
    animation: pulse-dot 1s step-end infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* ── Search ── */
  .search-wrap {
    position: relative;
    flex: 1;
    margin: 0 12px;
  }

  .search-input {
    width: 100%;
    padding: 6px 10px;
    background: var(--surface);
    border: none;
    border-radius: 0;
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    outline: none;
    transition: border-color 0.1s;
  }

  .search-input::placeholder { color: var(--text-dim); }

  .search-input:focus {}

  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    pointer-events: none;
  }

  .search-input:focus ~ .search-icon { color: var(--accent2); }

  .search-clear {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 24px;
    height: 24px;
    border-radius: 0;
    background: none;
    border: 1px solid var(--border);
    color: var(--accent2);
    font-size: 14px;
    font-family: var(--font);
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .search-clear.visible { display: flex; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 8px;
    border: none;
    background: #000;
    color: var(--text-dim);
    font-family: var(--font);
    font-weight: 400;
    font-size: 12px;
    text-transform: none;
    letter-spacing: 0;
    cursor: pointer;
  }

  .tab.active {
    background: #111111;
    color: #bbbbbb;
  }

  /* ── Section headings ── */
  .section-label {
    font-family: var(--font);
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .section-label .accent { color: var(--accent); }

  /* ── Video grid ── */
  .video-grid {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .video-card {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    border-radius: 0;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  .video-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent-soft);
    opacity: 0;
    pointer-events: none;
  }

  .video-card:active { background: rgba(0, 229, 255, 0.05); }
  .video-card:active::before { opacity: 1; }

  .video-card.playing {
    background: #111;
  }

  .thumb-wrap {
    position: relative;
    flex-shrink: 0;
    width: 120px;
    aspect-ratio: 16/9;
    border-radius: 0;
    overflow: hidden;
    background: #111;
    border: 1px solid var(--border);
  }

  .thumb-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .video-card:active .thumb-wrap img { opacity: 0.8; }

  .watch-progress {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    background: #2d8a4e;
  }

  .live-badge {
    position: absolute;
    top: 2px;
    left: 2px;
    background: #bb0000;
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    font-family: var(--font);
    padding: 1px 4px;
    letter-spacing: 1px;
  }

  .sub-badge {
    color: #bb0000;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .duration-badge {
    position: absolute;
    bottom: 2px;
    right: 2px;
    background: #000;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    font-family: var(--font);
    padding: 1px 4px;
    border-radius: 0;
    letter-spacing: 0.5px;
  }

  .video-info {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
    min-width: 0;
    padding: 0;
  }

  .video-title {
    font-size: 12px;
    font-weight: 500;
    font-family: var(--font);
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    color: var(--text);
  }

  .video-channel {
    font-size: 10px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .video-meta {
    font-size: 10px;
    color: var(--text-dim);
  }

  /* ── Play indicator on card ── */
  .play-indicator {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    width: 32px;
    height: 32px;
    border-radius: 0;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    pointer-events: none;
  }

  .play-indicator svg { width: 14px; height: 14px; fill: #000; }

  .video-card.playing .play-indicator {
    animation: pop-in 0.2s ease forwards;
  }

  @keyframes pop-in {
    to { transform: translate(-50%, -50%) scale(1); }
  }

  /* ── Toast ── */
  .toast-stack {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    display: flex;
    flex-direction: column-reverse;
    gap: 4px;
    align-items: center;
    pointer-events: none;
  }

  .toast {
    background: #000;
    color: var(--accent);
    font-family: var(--font);
    font-weight: 700;
    font-size: 12px;
    padding: 8px 16px;
    border: 1px solid var(--accent);
    border-radius: 0;
    opacity: 0;
    transform: translateY(20px);
    transition: transform 0.2s ease, opacity 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  /* ── Loading / empty states ── */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 48px 0;
    color: var(--text-dim);
    font-size: 11px;
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid #222;
    border-top-color: var(--accent);
    border-radius: 0;
    animation: spin 0.5s steps(8) infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-dim);
    font-size: 12px;
    line-height: 1.6;
  }

  .empty-state .icon {
    font-size: 24px;
    margin-bottom: 8px;
    opacity: 0.5;
  }

  /* ── Skeleton cards ── */
  .skeleton-card {
    display: flex;
    gap: 10px;
    padding: 8px;
    border: 1px solid #1a1a1a;
  }

  .skeleton-thumb {
    flex-shrink: 0;
    width: 120px;
    aspect-ratio: 16/9;
    background: #111;
    animation: blink 1s step-end infinite;
  }

  .skeleton-lines {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    justify-content: center;
  }

  .skeleton-line {
    height: 10px;
    background: #111;
    animation: blink 1s step-end infinite;
  }

  .skeleton-line:nth-child(1) { width: 90%; }
  .skeleton-line:nth-child(2) { width: 60%; }
  .skeleton-line:nth-child(3) { width: 40%; }

  @keyframes blink { 50% { opacity: 0.3; } }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ── Card entrance ── */
  .video-card { animation: card-in 0.15s ease both; }

  @keyframes card-in {
    from { opacity: 0; }
  }

  /* ── Auth button ── */
  .auth-btn {
    margin-left: auto;
    font-family: var(--font);
    font-weight: 700;
    font-size: 10px;
    padding: 5px 10px;
    border-radius: 0;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .auth-btn:active {
    background: var(--accent);
    color: #000;
  }

  .auth-btn.logged-in {
    border-color: #0f0;
    color: #0f0;
    font-size: 10px;
  }

  /* ── Now Playing bar ── */
  .now-playing {
    display: flex;
    flex-direction: column;
    padding: 8px 10px;
    padding-bottom: calc(6px + var(--safe-bottom));
    background: #000;
    border-top: 1px solid var(--accent);
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    animation: slide-up 0.2s ease;
    gap: 4px;
    overflow: hidden;
  }

  .np-top-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .np-btn-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    width: 100%;
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
  }

  .np-btn-row .np-btn {
    flex: 1 1 0;
    height: 28px;
    border: none;
    background: none;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .np-btn-row .np-btn:active { color: var(--text); }
  .np-btn-row .np-btn.active { color: #2d8a4e; }
  .np-btn-row .np-btn-stop { color: var(--text-dim); }

  .np-mute-btn { color: #333 !important; background: none !important; border: none !important; flex: 0 0 auto !important; width: auto !important; padding: 0 4px; }

  .np-volume-row {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
    min-width: 0;
  }

  .np-volume {
    flex: 1;
    min-width: 0;
    height: 12px;
    -webkit-appearance: none;
    appearance: none;
    background:
      repeating-linear-gradient(90deg, transparent, transparent 1px, var(--bg) 1px, var(--bg) 2px),
      repeating-linear-gradient(0deg, transparent, transparent 1px, var(--bg) 1px, var(--bg) 2px),
      #222;
    background-size: 2px 2px, 2px 2px, 100% 100%;
    border-radius: 0;
    outline: none;
  }

  .np-volume::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 0;
    background: #555;
    cursor: pointer;
  }

  @keyframes slide-up {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .np-thumb {
    width: 44px;
    height: 25px;
    border-radius: 0;
    background-size: cover;
    background-position: center;
    background-color: #111;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .np-info {
    flex: 1;
    min-width: 0;
    cursor: pointer;
  }

  .np-label {
    font-family: var(--font);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    font-weight: 500;
  }

  .np-title {
    font-size: 11px;
    font-family: var(--font);
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .np-stop {
    width: 28px;
    height: 28px;
    border-radius: 0;
    border: none;
    outline: none;
    background: none;
    color: var(--accent);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .np-progress-wrap {
    width: 100%;
    margin-top: 4px;
    position: relative;
    height: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .np-time {
    font-size: 10px;
    font-family: var(--font);
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }

  .np-progress-bar {
    flex: 1;
    height: 12px;
    background:
      repeating-linear-gradient(90deg, transparent, transparent 1px, var(--bg) 1px, var(--bg) 2px),
      repeating-linear-gradient(0deg, transparent, transparent 1px, var(--bg) 1px, var(--bg) 2px),
      #222;
    background-size: 2px 2px, 2px 2px, 100% 100%;
    border-radius: 0;
    position: relative;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }

  .np-progress-bar::before {
    content: '';
    position: absolute;
    inset: -8px 0;
  }

  .np-skip-btn {
    width: 28px;
    height: 28px;
    border-radius: 0;
    border: none;
    outline: none;
    background: none;
    color: var(--accent);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-family: var(--font);
  }

  .np-skip-btn:active { background: var(--accent-soft); }

  .np-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
    margin-top: 2px;
  }

  .np-progress-fill {
    height: 100%;
    background:
      repeating-linear-gradient(90deg, transparent, transparent 1px, var(--bg) 1px, var(--bg) 2px),
      repeating-linear-gradient(0deg, transparent, transparent 1px, var(--bg) 1px, var(--bg) 2px),
      #778;
    background-size: 2px 2px, 2px 2px, 100% 100%;
    width: 0%;
    pointer-events: none;
  }

  .np-progress-thumb {
    position: absolute;
    top: 0;
    width: 4px;
    height: 100%;
    background: #aab;
    pointer-events: none;
    left: 0%;
    transform: translateX(-50%);
  }

  /* ── Comments panel ── */
  .comments-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    max-width: 480px;
    margin: 0 auto;
    max-height: 70vh;
    background: #000;
    border-top: 1px solid var(--accent);
    z-index: 200;
    display: flex;
    flex-direction: column;
    animation: slide-up 0.2s ease;
  }

  .comments-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    font-family: var(--font);
    font-weight: 700;
    font-size: 12px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .comments-close {
    background: none;
    border: none;
    color: var(--accent2);
    font-size: 18px;
    font-family: var(--font);
    cursor: pointer;
  }

  .comments-list {
    overflow-y: auto;
    padding: 10px 12px;
    flex: 1;
  }

  .comment {
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid #1a1a1a;
  }

  .comment-author {
    font-size: 10px;
    font-weight: 700;
    color: var(--accent2);
    margin-bottom: 2px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .comment-text {
    font-size: 11px;
    color: var(--text);
    line-height: 1.5;
  }

  .comment-meta {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .comments-loading {
    text-align: center;
    padding: 24px;
    color: var(--text-dim);
    font-size: 11px;
  }

  /* ── Desktop layout ── */
  @media (min-width: 768px) {
    .app {
      max-width: 1200px;
      padding: 16px 24px calc(var(--safe-bottom) + 120px);
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .video-card {
      flex-direction: column;
      gap: 8px;
      padding: 0;
      border-bottom: none;
    }

    .video-card::before { display: none; }
    .video-card:hover { background: var(--surface-hover); }

    .thumb-wrap {
      width: 100%;
    }

    .thumb-wrap:hover img {
      transition: opacity 0.15s;
    }

    .video-info {
      padding: 0 2px;
    }

    .video-title {
      font-size: 13px;
      -webkit-line-clamp: 2;
    }

    .now-playing {
      max-width: 1200px;
      margin: 0 auto;
      left: 0;
      right: 0;
    }

    .comments-panel {
      max-width: 1200px;
    }
  }
</style>
</head>
<body>

<div class="app">
  <header class="header" style="position:relative">
    <span class="logo-text" onclick="document.getElementById('secretMenu').classList.toggle('open')">ytctrl</span>
    <div class="secret-menu" id="secretMenu">
      <div class="secret-menu-item" style="display:flex;align-items:center;gap:8px;">
        <button id="npMute" onclick="toggleMute()" style="background:none;border:none;color:#555;padding:0;display:flex;align-items:center;cursor:pointer;flex:0 0 auto"><svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></button>
        <input type="range" class="np-volume" id="npVolume" min="0" max="100" value="100" oninput="setVolume(this.value)" style="flex:1">
      </div>
      <button class="secret-menu-item" onclick="toggleResolution()">Toggle resolution</button>
    </div>
    <div class="search-wrap">
      <input
        class="search-input"
        id="searchInput"
        type="text"
        placeholder="Search"
        autocomplete="off"
        enterkeyhint="search"
      >
      <button class="search-clear" id="searchClear" aria-label="Clear">&times;</button>
    </div>
    <button class="auth-btn" id="authBtn" onclick="handleAuth()">Sign in</button>
  </header>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="home">Home</button>
    <button class="tab" data-tab="live">Live</button>
    <button class="tab" data-tab="history">History</button>
  </div>

  <div id="sectionLabel" class="section-label" style="display:none"><span class="accent">//</span> Trending</div>
  <div id="videoGrid" class="video-grid"></div>
  <div class="loading" id="loadMore" style="display:none"><div class="spinner"></div></div>
</div>

<div class="now-playing" id="nowPlaying" style="display:none">
  <div class="np-btn-row">
    <button class="np-btn" id="btnLaptop" onclick="moveMonitor('laptop')"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="2" y1="20" x2="22" y2="20"/></svg></button>
    <button class="np-btn" id="btnLg" onclick="moveMonitor('lg')"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></button>
    <button class="np-btn" id="btnMaximize" onclick="toggleMaximize()"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><rect x="3" y="3" width="18" height="18" rx="2"/></svg></button>
    <button class="np-btn" id="btnFullscreen" onclick="toggleFullscreen()"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button>
    <button class="np-btn" id="btnPhone" onclick="watchOnPhone()"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg></button>
    <button class="np-btn" onclick="toggleComments()" id="npComments"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
    <button class="np-btn np-btn-stop" onclick="stopPlayback()"><svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg></button>
  </div>
  <div class="np-top-row">
    <div class="np-thumb" id="npThumb" onclick="togglePlayPause()"></div>
    <div class="np-info" onclick="togglePlayPause()">
      <div class="np-label">Now playing</div>
      <div class="np-title" id="npTitle"></div>
    </div>
    <button class="np-stop" id="npPlayPause" onclick="togglePlayPause()">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
    </button>
  </div>
</div>

<div class="comments-panel" id="commentsPanel" style="display:none">
  <div class="comments-header">
    <span>Comments</span>
    <button class="comments-close" onclick="toggleComments()">&times;</button>
  </div>
  <div class="comments-list" id="commentsList"></div>
</div>

<div class="toast-stack" id="toastStack"></div>

<script>
  const grid = document.getElementById('videoGrid');
  const input = document.getElementById('searchInput');
  const clearBtn = document.getElementById('searchClear');
  const label = document.getElementById('sectionLabel');
  const toastStack = document.getElementById('toastStack');

  const authBtn = document.getElementById('authBtn');
  const npBar = document.getElementById('nowPlaying');
  const npThumb = document.getElementById('npThumb');
  const npTitle = document.getElementById('npTitle');
  const loadMoreEl = document.getElementById('loadMore');

  let searchTimeout = null;
  let currentlyPlaying = null;
  let nowPlayingUrl = null;
  let isLoggedIn = false;
  let pollInterval = null;
  let currentTab = 'home';
  let nextPageToken = null;
  let isLoadingMore = false;
  let currentQuery = '';

  // ── Render helpers ──

  function formatViews(n) {
    if (!n) return '';
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1).replace(/\.0$/, '') + 'M views';
    if (n >= 1_000) return (n / 1_000).toFixed(1).replace(/\.0$/, '') + 'K views';
    return n + ' views';
  }

  function showSkeletons() {
    grid.innerHTML = Array.from({ length: 6 }, () => `
      <div class="skeleton-card">
        <div class="skeleton-thumb"></div>
        <div class="skeleton-lines">
          <div class="skeleton-line"></div>
          <div class="skeleton-line"></div>
          <div class="skeleton-line"></div>
        </div>
      </div>
    `).join('');
  }

  function renderVideos(videos) {
    if (!videos.length) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="icon">:/</div>
          No results found. Try a different search.
        </div>`;
      return;
    }

    grid.innerHTML = videos.map((v, i) => {
      const hasProg = v.savedPosition > 0 && v.savedDuration > 0;
      const pct = hasProg ? Math.min(100, (v.savedPosition / v.savedDuration) * 100) : 0;
      return `
      <div class="video-card" data-url="${v.url}" style="animation-delay: ${i * 40}ms">
        <div class="thumb-wrap">
          <img src="${v.thumbnail}" alt="" loading="lazy">
          ${v.live ? '<span class="live-badge">LIVE</span>' : ''}${v.duration ? `<span class="duration-badge">${v.duration}</span>` : ''}
          ${hasProg ? `<div class="watch-progress" style="width:${pct}%"></div>` : ''}
        </div>
        <div class="video-info">
          <div class="video-title">${escapeHtml(v.title)}</div>
          ${v.channel ? `<div class="video-channel">${v.subscribed ? '<span class="sub-badge">SUB</span> ' : ''}${escapeHtml(v.channel)}</div>` : ''}
          <div class="video-meta">${v.concurrentViewers ? formatViews(v.concurrentViewers).replace(' views', ' watching') : formatViews(v.views)}${v.uploadedAt ? ` · ${v.uploadedAt}` : ''}${hasProg ? ` · ${fmtTime(v.savedPosition)} watched` : ''}</div>
        </div>
        <div class="play-indicator">
          <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
      </div>
    `}).join('');

    // Attach tap handlers + highlight playing
    grid.querySelectorAll('.video-card').forEach(card => {
      card.addEventListener('click', () => playVideo(card));
      if (nowPlayingUrl && card.dataset.url === nowPlayingUrl) {
        card.classList.add('playing');
        currentlyPlaying = card;
      }
    });
  }

  function appendVideos(videos) {
    const start = grid.querySelectorAll('.video-card').length;
    const html = videos.map((v, i) => `
      <div class="video-card" data-url="${v.url}" style="animation-delay: ${(start + i) * 40}ms">
        <div class="thumb-wrap">
          <img src="${v.thumbnail}" alt="" loading="lazy">
          ${v.live ? '<span class="live-badge">LIVE</span>' : ''}${v.duration ? `<span class="duration-badge">${v.duration}</span>` : ''}
        </div>
        <div class="video-info">
          <div class="video-title">${escapeHtml(v.title)}</div>
          ${v.channel ? `<div class="video-channel">${escapeHtml(v.channel)}</div>` : ''}
          <div class="video-meta">${formatViews(v.views)}${v.uploadedAt ? ` · ${v.uploadedAt}` : ''}</div>
        </div>
        <div class="play-indicator">
          <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
      </div>
    `).join('');
    grid.insertAdjacentHTML('beforeend', html);
    grid.querySelectorAll('.video-card:not([data-bound])').forEach(card => {
      card.dataset.bound = '1';
      card.addEventListener('click', () => playVideo(card));
    });
  }

  function escapeHtml(str) {
    const el = document.createElement('span');
    el.textContent = str;
    return el.innerHTML;
  }

  // ── API calls ──

  async function loadHome(refresh) {
    showSkeletons();
    label.innerHTML = `<span class="accent">//</span> Home`;
    try {
      const res = await fetch('/api/home');
      if (!res.ok) throw new Error('no home');
      const data = await res.json();
      if (!data.length) throw new Error('empty');
      renderVideos(data);
    } catch {
      label.innerHTML = `<span class="accent">//</span> Trending`;
      loadTrending(true);
    }
  }

  async function loadTrending(skipSkeleton) {
    if (!skipSkeleton) showSkeletons();
    try {
      const res = await fetch('/api/trending');
      const data = await res.json();
      renderVideos(data);
    } catch {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="icon">!</div>
          Couldn't load trending videos.<br>Check that the server is running.
        </div>`;
    }
  }

  async function search(query, append) {
    if (!append) { showSkeletons(); currentQuery = query; nextPageToken = null; }
    else { loadMoreEl.style.display = 'flex'; }
    label.innerHTML = `<span class="accent">//</span> Results`;
    try {
      let url = '/api/search?q=' + encodeURIComponent(query);
      if (append && nextPageToken) url += '&pageToken=' + nextPageToken;
      const res = await fetch(url);
      const data = await res.json();
      const videos = data.videos || data;
      nextPageToken = data.nextPageToken || null;
      if (append) appendVideos(videos);
      else renderVideos(videos);
    } catch {
      if (!append) grid.innerHTML = `
        <div class="empty-state">
          <div class="icon">!</div>
          Search failed. Try again.
        </div>`;
    }
    loadMoreEl.style.display = 'none';
    isLoadingMore = false;
  }

  async function playVideo(card) {
    const url = card.dataset.url;
    if (!url) return;

    // Visual feedback
    if (currentlyPlaying) currentlyPlaying.classList.remove('playing');
    card.classList.add('playing');
    currentlyPlaying = card;
    nowPlayingUrl = url;

    // Show toast
    showToast('Playing on computer');

    try {
      const res = await fetch('/api/play', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      if (!res.ok) showToast('Failed to play');
      else startPolling();
    } catch {
      showToast('Connection error');
    }
  }

  function showToast(msg) {
    const np = document.getElementById('nowPlaying');
    const offset = np && np.style.display !== 'none' ? np.offsetHeight : 0;
    toastStack.style.bottom = (offset + 8) + 'px';
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    toastStack.appendChild(el);
    requestAnimationFrame(() => el.classList.add('show'));
    setTimeout(() => {
      el.classList.remove('show');
      setTimeout(() => el.remove(), 200);
    }, 1500);
  }

  // ── Now Playing ──

  function fmtTime(s) {
    if (!s || !isFinite(s)) return '0:00';
    s = Math.floor(s);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    return `${m}:${String(sec).padStart(2,'0')}`;
  }

  function startPolling() {
    stopPolling();
    pollInterval = setInterval(pollPlayback, 1000);
    pollPlayback();
  }

  function stopPolling() {
    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
  }

  let controlsBuilt = false;
  let isSeeking = false;

  function hideNowPlaying() {
    npBar.style.display = 'none';
    controlsBuilt = false;
    const c = npBar.querySelector('.np-controls');
    if (c) c.remove();
  }

  async function pollPlayback() {
    try {
      const res = await fetch('/api/playback');
      const data = await res.json();
      if (data.playing && data.duration > 0) {
        npBar.style.display = 'flex';
        npBar.style.flexWrap = 'wrap';
        if (data.url) nowPlayingUrl = data.url;
        if (data.title) npTitle.textContent = data.title;

        // Highlight active mode buttons
        document.querySelectorAll('#btnLaptop,#btnLg,#btnMaximize,#btnFullscreen,#btnPhone').forEach(b => b.classList.remove('active'));
        if (data.monitor === 'laptop') document.getElementById('btnLaptop')?.classList.add('active');
        else document.getElementById('btnLg')?.classList.add('active');
        if (data.fullscreen) document.getElementById('btnFullscreen')?.classList.add('active');
        if (data.windowMode === 'maximize') document.getElementById('btnMaximize')?.classList.add('active');
        if (document.getElementById('phonePlayer')) document.getElementById('btnPhone')?.classList.add('active');

        // Sync play/pause icon
        const ppBtn = document.getElementById('npPlayPause');
        if (ppBtn) {
          ppBtn.innerHTML = data.paused
            ? '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><polygon points="6 3 20 12 6 21"/></svg>'
            : '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>';
        }
        const m = (data.url || '').match(/v=([\w-]+)/);
        if (m) npThumb.style.backgroundImage = `url(https://i.ytimg.com/vi/${m[1]}/default.jpg)`;

        if (!controlsBuilt) {
          controlsBuilt = true;
          const old = npBar.querySelector('.np-controls');
          if (old) old.remove();

          const controls = document.createElement('div');
          controls.className = 'np-controls';
          controls.innerHTML = `
            <button class="np-skip-btn" id="npSkipBack">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter"><polyline points="11 17 6 12 11 7"/></svg>
            </button>
            <span class="np-time" id="npTimePos">0:00</span>
            <div class="np-progress-bar" id="npProgressBar">
              <div class="np-progress-fill" id="npFill"></div>
              <div class="np-progress-thumb" id="npThumbDot"></div>
            </div>
            <span class="np-time" id="npTimeDur">0:00</span>
            <button class="np-skip-btn" id="npSkipFwd">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter"><polyline points="13 17 18 12 13 7"/></svg>
            </button>
          `;
          npBar.insertBefore(controls, npBar.firstChild);

          controls.querySelector('#npSkipBack').addEventListener('click', () => {
            fetch('/api/seek-relative', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ offset: -10 }) });
            showToast('-10s');
          });
          controls.querySelector('#npSkipFwd').addEventListener('click', () => {
            fetch('/api/seek-relative', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ offset: 10 }) });
            showToast('+10s');
          });

          const bar = controls.querySelector('#npProgressBar');
          let seekTimer = null;
          function updateBarVisual(clientX) {
            const rect = bar.getBoundingClientRect();
            const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
            const fill = document.getElementById('npFill');
            const thumb = document.getElementById('npThumbDot');
            const posEl = document.getElementById('npTimePos');
            const dur = parseFloat(bar.dataset.duration || 0);
            if (fill) fill.style.width = (pct * 100) + '%';
            if (thumb) thumb.style.left = (pct * 100) + '%';
            if (posEl && dur) posEl.textContent = fmtTime(pct * dur);
            return pct;
          }
          function sendSeek(clientX) {
            const pct = updateBarVisual(clientX);
            const dur = parseFloat(bar.dataset.duration || 0);
            if (dur > 0) {
              clearTimeout(seekTimer);
              seekTimer = setTimeout(() => {
                fetch('/api/seek', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ position: pct * dur })
                });
              }, 150);
            }
          }
          bar.addEventListener('click', (e) => { sendSeek(e.clientX); });
          let dragging = false;
          bar.addEventListener('touchstart', (e) => { e.preventDefault(); dragging = true; isSeeking = true; updateBarVisual(e.touches[0].clientX); });
          document.addEventListener('touchmove', (e) => { if (dragging) { e.preventDefault(); updateBarVisual(e.touches[0].clientX); } }, { passive: false });
          document.addEventListener('touchend', (e) => { if (dragging) { dragging = false; sendSeek(e.changedTouches[0].clientX); setTimeout(() => { isSeeking = false; }, 500); } });
        }

        if (!isSeeking) {
          const pct = (data.position / data.duration) * 100;
          const fill = document.getElementById('npFill');
          const thumb = document.getElementById('npThumbDot');
          const posEl = document.getElementById('npTimePos');
          const barEl = document.getElementById('npProgressBar');
          if (fill) fill.style.width = pct + '%';
          if (thumb) thumb.style.left = pct + '%';
          if (posEl) posEl.textContent = fmtTime(data.position);
          if (barEl) barEl.dataset.duration = data.duration;
        }
        const durEl = document.getElementById('npTimeDur');
        const barEl2 = document.getElementById('npProgressBar');
        if (durEl) durEl.textContent = fmtTime(data.duration);
        if (barEl2) barEl2.dataset.duration = data.duration;
      } else if (!data.playing) {
        hideNowPlaying();
        stopPolling();
      }
    } catch {}
  }

  window.togglePlayPause = async function() {
    const res = await fetch('/api/playpause', { method: 'POST' });
    const data = await res.json();
    const btn = document.getElementById('npPlayPause');
    if (btn) {
      btn.innerHTML = data.paused
        ? '<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><polygon points="6 3 20 12 6 21"/></svg>'
        : '<svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>';
    }
  };

  window.moveMonitor = async function(target) {
    fetch('/api/move-monitor', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ target }) });
  };

  let _volTimer = null;
  window.setVolume = function(val) {
    clearTimeout(_volTimer);
    _volTimer = setTimeout(() => {
      fetch('/api/volume', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ volume: parseInt(val) }) });
    }, 100);
  };

  window.toggleMute = async function() {
    const res = await fetch('/api/mute', { method: 'POST' });
    const data = await res.json();
    const btn = document.getElementById('npMute');
    if (btn) {
      btn.innerHTML = data.muted
        ? '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>'
        : '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>';
    }
  };

  window.watchOnPhone = async function() {
    // Toggle — if phone player is active, go back to computer
    if (document.getElementById('phonePlayer')) {
      backToComputer();
      return;
    }
    try {
      showToast('Loading stream...');
      try {
        const pb = await fetch('/api/playback').then(r => r.json());
        mpvStateBeforePhone = pb.windowMode;
      } catch { mpvStateBeforePhone = null; }
      const res = await fetch('/api/watch-on-phone', { method: 'POST' });
      const data = await res.json();
      if (data.streamUrl) {
        // Show sticky video at top, rest of app visible below
        const player = document.createElement('div');
        player.id = 'phonePlayer';
        player.style.cssText = 'position:sticky;top:0;z-index:500;background:#000;border-bottom:1px solid var(--border);';
        player.innerHTML = `
          <div style="position:relative;">
            <video id="phoneVideo" style="width:100%;background:#000;display:block" controls playsinline autoplay muted>
              <source src="${data.streamUrl}" type="${data.streamUrl.includes('.m3u8') ? 'application/x-mpegURL' : 'video/mp4'}">
            </video>
            <button onclick="closePhonePlayer()" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.6);border:none;color:#fff;font-size:18px;cursor:pointer;padding:2px 8px;line-height:1">&times;</button>
          </div>
        `;
        document.querySelector('.app').prepend(player);
        // Hide mpv video on computer by default
        mpvVideoHidden = true;
        fetch('/api/mpv-video', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ hidden: true }) });

        const vid = document.getElementById('phoneVideo');
        vid.addEventListener('playing', async function onPlay() {
          vid.removeEventListener('playing', onPlay);
          const fresh = await fetch('/api/playback').then(r => r.json());
          vid.currentTime = (fresh.position || data.seconds) + 1;
        }, { once: true });

        // Keep phone synced to desktop — check every 3s, re-sync if >2s off
        if (window._phoneSyncInterval) clearInterval(window._phoneSyncInterval);
        window._phoneSyncInterval = setInterval(async () => {
          try {
            const vid = document.getElementById('phoneVideo');
            if (!vid || vid.paused) return;
            const fresh = await fetch('/api/playback').then(r => r.json());
            if (!fresh.position) return;
            const drift = Math.abs(vid.currentTime - fresh.position);
            if (drift > 2) vid.currentTime = fresh.position + 0.5;
          } catch {}
        }, 3000);
      } else if (data.youtubeUrl) {
        showToast('Opening YouTube');
        setTimeout(() => { window.location.href = data.youtubeUrl; }, 500);
      }
    } catch {
      showToast('Failed');
    }
  };

  let mpvVideoHidden = false;
  let mpvStateBeforePhone = null;
  window.toggleMpvVideo = async function() {
    mpvVideoHidden = !mpvVideoHidden;
    await fetch('/api/mpv-video', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ hidden: mpvVideoHidden }) });
    const btn = document.getElementById('mpvVideoToggle');
    if (btn) btn.textContent = mpvVideoHidden ? 'Show on computer' : 'Hide on computer';
  };

  window.closePhonePlayer = function() {
    if (window._phoneSyncInterval) { clearInterval(window._phoneSyncInterval); window._phoneSyncInterval = null; }
    // Restore mpv video
    if (mpvVideoHidden) {
      mpvVideoHidden = false;
      fetch('/api/mpv-video', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ hidden: false }) });
    }
    const player = document.getElementById('phonePlayer');
    if (player) player.remove();
    startPolling();
  };

  window.backToComputer = async function() {
    const vid = document.getElementById('phoneVideo');
    if (vid) {
      const pos = vid.currentTime;
      try {
        await fetch('/api/seek', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ position: pos }) });
      } catch {}
    }
    const savedMode = mpvStateBeforePhone;
    // Restore video track first (closePhonePlayer does this)
    closePhonePlayer();
    // Then restore window mode after video is back
    if (savedMode === 'fullscreen') {
      await new Promise(r => setTimeout(r, 300));
      try { await fetch('/api/fullscreen', { method: 'POST' }); } catch {}
    } else if (savedMode === 'maximize') {
      await new Promise(r => setTimeout(r, 800));
      try { await fetch('/api/maximize', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ force: true }) }); } catch {}
    }
    showToast('Synced to computer');
  };

  let commentsOpen = false;
  window.toggleComments = async function() {
    const panel = document.getElementById('commentsPanel');
    const list = document.getElementById('commentsList');
    if (commentsOpen) {
      panel.style.display = 'none';
      commentsOpen = false;
      return;
    }
    commentsOpen = true;
    panel.style.display = 'flex';
    list.innerHTML = '<div class="comments-loading"><div class="spinner"></div>Loading comments...</div>';
    try {
      const pb = await fetch('/api/playback').then(r => r.json());
      if (!pb.url) { list.innerHTML = '<div class="comments-loading">Nothing playing</div>'; return; }
      const m = pb.url.match(/v=([\w-]+)/);
      if (!m) return;
      const res = await fetch('/api/comments?videoId=' + m[1]);
      const data = await res.json();
      if (!data.length) { list.innerHTML = '<div class="comments-loading">No comments</div>'; return; }
      list.innerHTML = data.map(c => `
        <div class="comment">
          <div class="comment-author">${escapeHtml(c.author)}</div>
          <div class="comment-text">${escapeHtml(c.text)}</div>
          <div class="comment-meta">${c.likes ? c.likes + ' likes' : ''} ${c.publishedAt || ''}</div>
        </div>
      `).join('');
    } catch {
      list.innerHTML = '<div class="comments-loading">Failed to load comments</div>';
    }
  };

  window.toggleFullscreen = async function() {
    fetch('/api/fullscreen', { method: 'POST' });
  };

  window.toggleMaximize = async function() {
    fetch('/api/maximize', { method: 'POST' });
  };

  window.stopPlayback = async function() {
    await fetch('/api/stop', { method: 'POST' });
    hideNowPlaying();
    stopPolling();
    showToast('Stopped');
  };

  // ── Search input handling ──

  function isYouTubeUrl(str) {
    return /^https?:\/\/(www\.)?(youtube\.com\/(watch\?v=|live\/|shorts\/)|youtu\.be\/)/.test(str);
  }

  function normalizeYouTubeUrl(str) {
    const m = str.match(/(?:youtube\.com\/(?:watch\?v=|live\/|shorts\/)|youtu\.be\/)([\w-]+)/);
    return m ? `https://www.youtube.com/watch?v=${m[1]}` : null;
  }

  input.addEventListener('input', () => {
    const q = input.value.trim();
    clearBtn.classList.toggle('visible', q.length > 0);
    clearTimeout(searchTimeout);

    if (!q) {
      if (currentTab === 'history') loadHistory();
      else loadHome();
      return;
    }

    // If it's a YouTube URL, play it immediately
    if (isYouTubeUrl(q)) {
      const url = normalizeYouTubeUrl(q);
      if (url) {
        showToast('Playing on computer');
        fetch('/api/play', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        }).then(() => startPolling());
        input.value = '';
        clearBtn.classList.remove('visible');
        return;
      }
    }

    searchTimeout = setTimeout(() => search(q), 500);
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      clearTimeout(searchTimeout);
      const q = input.value.trim();
      if (q && !isYouTubeUrl(q)) search(q);
      input.blur();
    }
  });

  clearBtn.addEventListener('click', () => {
    input.value = '';
    clearBtn.classList.remove('visible');
    loadHome();
    input.focus();
  });

  // ── Auth ──

  async function checkAuth() {
    try {
      const res = await fetch('/api/auth/status');
      const data = await res.json();
      isLoggedIn = data.loggedIn;
      updateAuthUI();
    } catch {}
  }

  function updateAuthUI() {
    if (isLoggedIn) {
      authBtn.textContent = 'Signed in';
      authBtn.classList.add('logged-in');
    } else {
      authBtn.textContent = 'Sign in';
      authBtn.classList.remove('logged-in');
    }
  }

  window.handleAuth = async function() {
    if (isLoggedIn) {
      await fetch('/api/auth/logout', { method: 'POST' });
      isLoggedIn = false;
      updateAuthUI();
      loadHome();
    } else {
      window.location.href = '/oauth/login';
    }
  };

  // ── History ──

  async function loadHistory() {
    showSkeletons();
    label.innerHTML = `<span class="accent">//</span> History`;
    try {
      const res = await fetch('/api/history');
      const data = await res.json();
      if (!data.length) {
        grid.innerHTML = `<div class="empty-state">Play some videos to build your history.</div>`;
        return;
      }
      renderVideos(data);
      // Check live status in background, then add badges
      const ids = data.map(v => v.id).filter(Boolean).slice(0, 10).join(',');
      if (ids) {
        fetch('/api/live-status?ids=' + ids).then(r => r.json()).then(liveMap => {
          for (const [id, isLive] of Object.entries(liveMap)) {
            if (!isLive) continue;
            const card = grid.querySelector(`[data-url*="${id}"] .thumb-wrap`);
            if (card && !card.querySelector('.live-badge')) {
              card.insertAdjacentHTML('afterbegin', '<span class="live-badge">LIVE</span>');
            }
          }
        }).catch(() => {});
      }
    } catch {
      grid.innerHTML = `<div class="empty-state"><div class="icon">!</div>Couldn't load history.</div>`;
    }
  }

  async function loadLive() {
    showSkeletons();
    label.innerHTML = `<span class="accent">//</span> Live`;
    try {
      const res = await fetch('/api/live');
      const data = await res.json();
      if (!data.length) throw new Error('empty');
      renderVideos(data);
    } catch {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="icon">!</div>
          No live streams found.
        </div>`;
    }
  }

  // ── Tabs ──

  document.getElementById('tabs').addEventListener('click', (e) => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    input.value = '';
    clearBtn.classList.remove('visible');
    currentQuery = '';
    nextPageToken = null;
    if (currentTab === 'history') loadHistory();
    else if (currentTab === 'live') loadLive();
    else loadHome();
  });

  // ── Infinite scroll ──

  window.addEventListener('scroll', () => {
    if (isLoadingMore || currentTab === 'history' || currentTab === 'live') return;
    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 400) {
      if (currentQuery && nextPageToken) {
        isLoadingMore = true;
        search(currentQuery, true);
      }
    }
  });

  // ── Hover preview (desktop) — cycle YouTube thumbnail frames ──
  if (window.matchMedia('(hover: hover)').matches) {
    grid.addEventListener('mouseover', (e) => {
      const card = e.target.closest('.video-card');
      if (!card || card._hoverInterval) return;
      const m = card.dataset.url?.match(/v=([\w-]+)/);
      if (!m) return;
      const img = card.querySelector('.thumb-wrap img');
      if (!img) return;
      card._origSrc = img.src;
      let frame = 1;
      card._hoverInterval = setInterval(() => {
        img.src = `https://i.ytimg.com/vi/${m[1]}/${frame}.jpg`;
        frame = (frame % 3) + 1;
      }, 800);
    });

    grid.addEventListener('mouseout', (e) => {
      const card = e.target.closest('.video-card');
      if (!card || !card._hoverInterval) return;
      // Only stop if we actually left the card (not just moved between children)
      if (card.contains(e.relatedTarget)) return;
      clearInterval(card._hoverInterval);
      card._hoverInterval = null;
      const img = card.querySelector('.thumb-wrap img');
      if (img && card._origSrc) img.src = card._origSrc;
    });
  }

  // ── Secret menu ──
  window.toggleResolution = async function() {
    document.getElementById('secretMenu').classList.remove('open');
    try {
      await fetch('/api/toggle-resolution', { method: 'POST' });
      showToast('Resolution toggled');
    } catch { showToast('Failed'); }
  };

  document.addEventListener('click', (e) => {
    const menu = document.getElementById('secretMenu');
    if (menu.classList.contains('open') && !e.target.closest('.logo-text') && !e.target.closest('.secret-menu')) {
      menu.classList.remove('open');
    }
  });

  // ── Init ──
  checkAuth().then(() => loadHome());
  startPolling();

  // Auto-reload when files change
  let _reloadVer = 0;
  setInterval(async () => {
    try {
      const r = await fetch('/api/version');
      const d = await r.json();
      if (_reloadVer && d.ts !== _reloadVer) location.reload();
      _reloadVer = d.ts;
    } catch {}
  }, 3000);
</script>
</body>
</html>
