  window.watchOnPhone = async function() {
    // Toggle — if phone player is active, go back to computer
    if (document.getElementById('phonePlayer')) {
      backToComputer();
      return;
    }
    try {
      showToast('Loading stream...');
      try {
        const pb = await fetch('/api/playback').then(r => r.json());
        mpvStateBeforePhone = pb.windowMode;
      } catch { mpvStateBeforePhone = null; }
      const res = await fetch('/api/watch-on-phone', { method: 'POST' });
      const data = await res.json();
      if (data.streamUrl) {
        // Show sticky video at top, rest of app visible below
        const player = document.createElement('div');
        player.id = 'phonePlayer';
        player.style.cssText = 'position:fixed;top:env(safe-area-inset-top,0px);left:0;right:0;z-index:99;background:#000;border-bottom:1px solid var(--border);';
        const videoSrc = data.streamUrl;
        const videoType = 'video/mp4';
        player.innerHTML = `
          <div style="position:relative;">
            <video id="phoneVideo" style="width:100%;background:#000;display:block" controls playsinline autoplay muted>
              <source src="${videoSrc}" type="${videoType}">
            </video>
            <button onclick="closePhonePlayer()" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.6);border:none;color:#fff;font-size:18px;cursor:pointer;padding:2px 8px;line-height:1">&times;</button>
          </div>
        `;
        document.body.prepend(player);
        // Add padding to push content below the fixed player
        setTimeout(() => {
          document.querySelector('.app').style.paddingTop = player.offsetHeight + 'px';
        }, 100);
        // Hide mpv video on computer by default
        mpvVideoHidden = true;
        fetch('/api/mpv-video', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ hidden: true }) });

        if (window._phoneSyncInterval) clearInterval(window._phoneSyncInterval);
        window._driftSamples = [];
        window._rateCalibrated = false;
        window._liveDriftSamples = [];
        window._liveSynced = false;
        {
          const vid2 = document.getElementById('phoneVideo');
          let syncOffset = null;
          let liveState = 'wait'; // wait → seek → settle → monitor
          let settleTimer = null;

          // Wait for phone to actually render before doing anything
          const waitForReal = () => {
            const v = document.getElementById('phoneVideo');
            if (!v) return;
            let lastTime = v.currentTime;
            const check = setInterval(async () => {
              const v2 = document.getElementById('phoneVideo');
              if (!v2) { clearInterval(check); return; }
              if (v2.currentTime > 0 && v2.currentTime !== lastTime && v2.readyState >= 3) {
                clearInterval(check);
                try {
                  const ac = new AbortController();
                  setTimeout(() => ac.abort(), 3000);
                  const pb = await fetch('/api/playback', { signal: ac.signal }).then(r => r.json());
                  if (pb.position && v2) {
                    syncOffset = pb.position - v2.currentTime;
                    if (pb.isLive) liveState = 'seek'; // ready to seek VLC
                  }
                } catch {}
              }
              lastTime = v2.currentTime;
            }, 500);
          };
          vid2.addEventListener('playing', waitForReal, { once: true });

          window._phoneSyncInterval = setInterval(async () => {
            try {
              const vid = document.getElementById('phoneVideo');
              if (!vid) return;
              const ac = new AbortController();
              const t = setTimeout(() => ac.abort(), 3000);
              const pb = await fetch('/api/playback', { signal: ac.signal }).then(r => r.json());
              clearTimeout(t);
              if (!pb.position) return;

              if (pb.isLive) {
                // ── Live (VLC) sync via PDT ──
                // Phone: getStartDate() + currentTime (sub-second, from HLS PDT)
                // VLC: pdtEpoch + vlcTimeNow() (sub-second, from manifest PDT + interpolation)
                if (pb.paused && !vid.paused) vid.pause();
                else if (!pb.paused && vid.paused) vid.play().catch(() => {});

                let phoneAbsMs = null;
                try {
                  const sd = vid.getStartDate();
                  if (sd && !isNaN(sd.getTime())) phoneAbsMs = sd.getTime() + vid.currentTime * 1000;
                } catch {}
                if (!phoneAbsMs) return;

                const ac2 = new AbortController();
                const t2 = setTimeout(() => ac2.abort(), 3000);
                const vlcSync = await fetch('/api/vlc-absolute-time', { signal: ac2.signal }).then(r => r.json()).catch(() => ({}));
                clearTimeout(t2);
                if (!vlcSync.absoluteMs) return;

                const drift = (vlcSync.absoluteMs - phoneAbsMs) / 1000;

                fetch('/api/phone-debug', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ drift: +drift.toFixed(2), state: liveState })
                });

                // Re-sync phone if drift exceeds 1s
                if (liveState === 'done' && Math.abs(drift) > 1) {
                  vid.currentTime = vid.currentTime + drift;
                  liveState = 'settle';
                  settleTimer = setTimeout(() => { liveState = 'done'; }, 3000);
                }
                if (liveState === 'seek' || liveState === 'wait') liveState = 'done';
                return;
              }

              // ── VOD (mpv) sync ──
              if (syncOffset === null) return;
              if (pb.paused && !vid.paused) vid.pause();
              else if (!pb.paused && vid.paused) vid.play().catch(() => {});
              if (pb.paused || vid.paused) return;
              const target = pb.position - syncOffset;
              const drift = target - vid.currentTime;
              if (Math.abs(drift) > 2) vid.currentTime = target;
            } catch {}
          }, 1000);
        }
      } else if (data.youtubeUrl) {
        showToast('Opening YouTube');
        setTimeout(() => { window.location.href = data.youtubeUrl; }, 500);
      }
    } catch {
      showToast('Failed');
    }
  };

  let mpvVideoHidden = false;
  let mpvStateBeforePhone = null;
  window.toggleMpvVideo = async function() {
    mpvVideoHidden = !mpvVideoHidden;
    await fetch('/api/mpv-video', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ hidden: mpvVideoHidden }) });
    const btn = document.getElementById('mpvVideoToggle');
    if (btn) btn.textContent = mpvVideoHidden ? 'Show on computer' : 'Hide on computer';
  };

  window.closePhonePlayer = function() {
    if (window._phoneSyncInterval) { clearInterval(window._phoneSyncInterval); window._phoneSyncInterval = null; }
    fetch('/api/stop-phone-stream', { method: 'POST' }).catch(() => {});
    // Restore mpv video
    if (mpvVideoHidden) {
      mpvVideoHidden = false;
      fetch('/api/mpv-video', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ hidden: false }) });
    }
    const player = document.getElementById('phonePlayer');
    if (player) player.remove();
    document.querySelector('.app').style.paddingTop = '';
    startPolling();
  };

  window.backToComputer = async function() {
    const vid = document.getElementById('phoneVideo');
    if (vid) {
      const pos = vid.currentTime;
      try {
        await fetch('/api/seek', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ position: pos }) });
      } catch {}
    }
    const savedMode = mpvStateBeforePhone;
    // Restore video track first (closePhonePlayer does this)
    closePhonePlayer();
    // Then restore window mode after video is back
    if (savedMode === 'fullscreen') {
      await new Promise(r => setTimeout(r, 300));
      try { await fetch('/api/fullscreen', { method: 'POST' }); } catch {}
    } else if (savedMode === 'maximize') {
      await new Promise(r => setTimeout(r, 800));
      try { await fetch('/api/maximize', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ force: true }) }); } catch {}
    }
    showToast('Synced to computer');
  };

  let commentsOpen = false;
  window.toggleComments = async function() {
    const existing = document.getElementById('chatEmbed');
    if (existing) {
      if (existing._chatPollTimer) existing._chatPollTimer();
      existing.remove();
      commentsOpen = false;
      return;
    }
    commentsOpen = true;
    try {
      const pb = await fetch('/api/playback').then(r => r.json());
      if (!pb.url) return;
      const m = pb.url.match(/v=([\w-]+)/);
      if (!m) return;

      const embed = document.createElement('div');
      embed.id = 'chatEmbed';
      embed.style.cssText = 'position:sticky;top:0;z-index:500;background:#000;border-bottom:1px solid var(--border);';

      if (pb.isLive) {
        embed.innerHTML = `
          <div style="position:relative;">
            <button onclick="toggleComments()" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.6);border:none;color:#fff;font-size:18px;cursor:pointer;padding:2px 8px;line-height:1;z-index:1">&times;</button>
            <div id="liveChatList" style="height:300px;overflow-y:auto;padding:8px 0;"></div>
          </div>`;
        document.querySelector('.app').prepend(embed);
        let chatToken = null;
        const seenIds = new Set();
        let chatPollTimer = null;
        const chatAbort = new AbortController();
        const pollChat = async () => {
          if (chatAbort.signal.aborted || document.hidden || !document.getElementById('chatEmbed')) return;
          if (seenIds.size > 2000) { const arr = [...seenIds]; seenIds.clear(); arr.slice(-1000).forEach(id => seenIds.add(id)); }
          try {
            const url = '/api/livechat?videoId=' + m[1] + (chatToken ? '&pageToken=' + chatToken : '');
            const r = await fetch(url, { signal: chatAbort.signal });
            const data = await r.json();
            if (chatAbort.signal.aborted) return;
            const list = document.getElementById('liveChatList');
            if (!list) return;
            if (data.messages?.length) {
              const wasAtBottom = list.scrollHeight - list.scrollTop - list.clientHeight < 50;
              for (const msg of data.messages) {
                const id = msg.time + msg.author;
                if (seenIds.has(id)) continue;
                seenIds.add(id);
                const div = document.createElement('div');
                div.style.cssText = 'padding:3px 12px;';
                div.innerHTML = `<span style="color:${msg.isOwner ? '#2d8a4e' : msg.isMod ? '#5555ff' : '#777'};font-family:var(--font);font-size:10px;font-weight:700">${escapeHtml(msg.author)}</span><span style="color:var(--text);font-family:var(--font);font-size:11px;margin-left:6px">${escapeHtml(msg.text)}</span>`;
                list.appendChild(div);
              }
              while (list.children.length > 500) list.removeChild(list.firstChild);
              if (wasAtBottom) list.scrollTop = list.scrollHeight;
            }
            chatToken = data.nextPageToken;
            if (!chatAbort.signal.aborted && document.getElementById('chatEmbed')) {
              chatPollTimer = setTimeout(pollChat, data.pollingMs || 5000);
            }
          } catch {}
        };
        // Store cleanup ref — abort controller cancels in-flight fetch + prevents rescheduling
        embed._chatPollTimer = () => { chatAbort.abort(); if (chatPollTimer) clearTimeout(chatPollTimer); };
        pollChat();
        return;
      } else {
        embed.innerHTML = '<div style="padding:12px;color:var(--text-dim);font-family:var(--font);font-size:11px"><div class="spinner"></div> Loading comments...</div>';
        document.querySelector('.app').prepend(embed);
        const res = await fetch('/api/comments?videoId=' + m[1]);
        const data = await res.json();
        if (!data.length) {
          embed.innerHTML = `<div style="position:relative;padding:12px;color:var(--text-dim);font-family:var(--font);font-size:11px">No comments<button onclick="toggleComments()" style="position:absolute;top:4px;right:4px;background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer">&times;</button></div>`;
          return;
        }
        embed.innerHTML = `
          <div style="position:relative;max-height:400px;overflow-y:auto;">
            <button onclick="toggleComments()" style="position:sticky;top:0;right:0;float:right;background:rgba(0,0,0,0.6);border:none;color:#fff;font-size:18px;cursor:pointer;padding:2px 8px;line-height:1;z-index:1">&times;</button>
            ${data.map(c => `
              <div style="padding:8px 12px;border-bottom:1px solid var(--border);">
                <div style="color:var(--accent);font-family:var(--font);font-size:10px;font-weight:700">${escapeHtml(c.author)}</div>
                <div style="color:var(--text);font-family:var(--font);font-size:11px;margin-top:2px">${escapeHtml(c.text)}</div>
              </div>
            `).join('')}
          </div>`;
        return;
      }
      document.querySelector('.app').prepend(embed);
    } catch {}
  };

  window.toggleFullscreen = async function() {
    fetch('/api/fullscreen', { method: 'POST' });
  };

  window.toggleMaximize = async function() {
    fetch('/api/maximize', { method: 'POST' });
  };

  window.stopPlayback = async function() {
    await fetch('/api/stop', { method: 'POST' });
    if (document.getElementById('phonePlayer')) closePhonePlayer();
    hideNowPlaying();
    deactivateMediaSession();
    stopPolling();
    showToast('Stopped');
  };

  // ── Search input handling ──

  function isYouTubeUrl(str) {
    return /^https?:\/\/(www\.)?(youtube\.com\/(watch\?v=|live\/|shorts\/)|youtu\.be\/)/.test(str);
  }

  function normalizeYouTubeUrl(str) {
    const m = str.match(/(?:youtube\.com\/(?:watch\?v=|live\/|shorts\/)|youtu\.be\/)([\w-]+)/);
    return m ? `https://www.youtube.com/watch?v=${m[1]}` : null;
  }

  input.addEventListener('input', () => {
    const q = input.value.trim();
    clearBtn.classList.toggle('visible', q.length > 0);
    clearTimeout(searchTimeout);

    if (!q) {
      if (currentTab === 'history') loadHistory();
      else loadHome();
      return;
    }

    // If it's a YouTube URL, play it immediately
    if (isYouTubeUrl(q)) {
      const url = normalizeYouTubeUrl(q);
      if (url) {
        showToast('Playing on computer');
        fetch('/api/play', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        }).then(() => { activateMediaSession('', '', url); startPolling(); });
        input.value = '';
        clearBtn.classList.remove('visible');
        return;
      }
    }

    searchTimeout = setTimeout(() => search(q), 500);
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      clearTimeout(searchTimeout);
      const q = input.value.trim();
      if (q && !isYouTubeUrl(q)) search(q);
      input.blur();
    }
  });

  clearBtn.addEventListener('click', () => {
    input.value = '';
    clearBtn.classList.remove('visible');
    loadHome();
    input.focus();
  });

  // ── Auth ──

  async function checkAuth() {
    try {
      const res = await fetch('/api/auth/status');
      const data = await res.json();
      isLoggedIn = data.loggedIn;
      updateAuthUI();
    } catch {}
  }

  function updateAuthUI() {
    if (isLoggedIn) {
      authBtn.textContent = 'Signed in';
      authBtn.classList.add('logged-in');
    } else {
      authBtn.textContent = 'Sign in';
      authBtn.classList.remove('logged-in');
    }
  }

  window.handleAuth = async function() {
    if (isLoggedIn) {
      await fetch('/api/auth/logout', { method: 'POST' });
      isLoggedIn = false;
      updateAuthUI();
      loadHome();
    } else {
      window.location.href = '/oauth/login';
    }
  };

  // ── History ──

  async function loadHistory() {
    const gen = ++loadGen;
    showSkeletons();
    label.innerHTML = `<span class="accent">//</span> History`;
    try {
      const res = await fetch('/api/history');
      if (gen !== loadGen) return;
      const data = await res.json();
      if (gen !== loadGen) return;
      if (!data.length) {
        grid.innerHTML = `<div class="empty-state">Play some videos to build your history.</div>`;
        return;
      }
      renderVideos(data);
      // Check live status in background, then add badges
      const ids = data.map(v => v.id).filter(Boolean).slice(0, 10).join(',');
      if (ids) {
        fetch('/api/live-status?ids=' + ids).then(r => r.json()).then(liveMap => {
          for (const [id, isLive] of Object.entries(liveMap)) {
            if (!isLive) continue;
            const card = grid.querySelector(`[data-url*="${id}"] .thumb-wrap`);
            if (card && !card.querySelector('.live-badge')) {
              card.insertAdjacentHTML('afterbegin', '<span class="live-badge">LIVE</span>');
            }
          }
        }).catch(() => {});
      }
    } catch {
      grid.innerHTML = `<div class="empty-state"><div class="icon">!</div>Couldn't load history.</div>`;
    }
  }

  async function loadLive() {
    const gen = ++loadGen;
    showSkeletons();
    label.innerHTML = `<span class="accent">//</span> Live`;
    try {
      const res = await fetch('/api/live');
      if (gen !== loadGen) return;
      const data = await res.json();
      if (gen !== loadGen) return;
      if (!data.length) throw new Error('empty');
      renderVideos(data);
    } catch {
      if (gen !== loadGen) return;
      grid.innerHTML = `
        <div class="empty-state">
          <div class="icon">!</div>
          No live streams found.
        </div>`;
    }
  }

  // ── Tabs ──

  document.getElementById('tabs').addEventListener('click', (e) => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    const isRetap = tab.dataset.tab === currentTab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    input.value = '';
    clearBtn.classList.remove('visible');
    currentQuery = '';
    nextPageToken = null;
    if (currentTab === 'history') loadHistory();
    else if (currentTab === 'live') loadLive();
    else loadHome(isRetap);
    if (isRetap) window.scrollTo(0, 0);
  });

  // ── Infinite scroll ──

  window.addEventListener('scroll', () => {
    if (isLoadingMore || currentTab === 'history' || currentTab === 'live') return;
    if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 400) {
      if (currentQuery && nextPageToken) {
        isLoadingMore = true;
        search(currentQuery, true);
      } else if (currentTab === 'home' && homeHasMore) {
        loadMoreHome();
      }
    }
  });

  // ── Long press context menu ──
  let _lpTimer = null;
  let _lpCard = null;

  grid.addEventListener('touchstart', (e) => {
    const card = e.target.closest('.video-card');
    if (!card) return;
    _lpCard = card;
    _lpTimer = setTimeout(() => {
      e.preventDefault();
      showCardMenu(card);
      _lpCard = null;
    }, 500);
  }, { passive: false });

  grid.addEventListener('touchmove', () => { clearTimeout(_lpTimer); _lpCard = null; });
  grid.addEventListener('touchend', () => { clearTimeout(_lpTimer); });

  // Desktop: right-click
  grid.addEventListener('contextmenu', (e) => {
    const card = e.target.closest('.video-card');
    if (!card) return;
    e.preventDefault();
    showCardMenu(card);
  });

  function showCardMenu(card, touchEvent) {
    // Remove existing
    const old = document.getElementById('cardMenu');
    if (old) old.remove();

    const channel = card.dataset.channel;
    const channelId = card.dataset.channelId;
    const rect = card.getBoundingClientRect();
    const menu = document.createElement('div');
    menu.id = 'cardMenu';
    menu.className = 'secret-menu open';
    const top = Math.min(rect.bottom, window.innerHeight - 100);
    const left = Math.min(rect.left + 16, window.innerWidth - 200);
    menu.style.cssText = `position:fixed;top:${top}px;left:${left}px;z-index:300;`;
    const url = card.dataset.url;
    if (channelId) {
      const chBtn = document.createElement('button');
      chBtn.className = 'secret-menu-item';
      chBtn.textContent = 'More from ' + (channel || 'channel');
      chBtn.addEventListener('click', () => showChannelVideos(channelId, channel));
      menu.appendChild(chBtn);
    }
    const copyBtn = document.createElement('button');
    copyBtn.className = 'secret-menu-item';
    copyBtn.textContent = 'Copy link';
    copyBtn.addEventListener('click', () => copyText(url));
    menu.appendChild(copyBtn);
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'secret-menu-item';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.addEventListener('click', () => menu.remove());
    menu.appendChild(cancelBtn);
    document.body.appendChild(menu);

    // Close on outside click (self-removes if menu was already removed)
    setTimeout(() => {
      const close = (e) => {
        if (!document.getElementById('cardMenu') || !e.target.closest('#cardMenu')) {
          menu.remove();
          document.removeEventListener('click', close);
        }
      };
      document.addEventListener('click', close);
    }, 100);
  }

  window.showChannelVideos = async function(channelId, channelName) {
    document.getElementById('cardMenu')?.remove();
    showSkeletons();
    label.innerHTML = `<span class="accent">//</span> ${escapeHtml(channelName || 'Channel')}`;
    try {
      const res = await fetch('/api/channel-videos?channelId=' + encodeURIComponent(channelId));
      const data = await res.json();
      if (data.length) renderVideos(data);
      else grid.innerHTML = '<div class="empty-state"><div class="icon">:/</div>No videos found</div>';
    } catch {
      grid.innerHTML = '<div class="empty-state"><div class="icon">!</div>Failed to load</div>';
    }
  };

  // ── Hover preview (desktop) — cycle YouTube thumbnail frames ──
  if (window.matchMedia('(hover: hover)').matches) {
    grid.addEventListener('mouseover', (e) => {
      const card = e.target.closest('.video-card');
      if (!card || card._hoverInterval) return;
      const m = card.dataset.url?.match(/v=([\w-]+)/);
      if (!m) return;
      const img = card.querySelector('.thumb-wrap img');
      if (!img) return;
      card._origSrc = img.src;
      let frame = 1;
      card._hoverInterval = setInterval(() => {
        img.src = `https://i.ytimg.com/vi/${m[1]}/${frame}.jpg`;
        frame = (frame % 3) + 1;
      }, 800);
    });

    grid.addEventListener('mouseout', (e) => {
      const card = e.target.closest('.video-card');
      if (!card || !card._hoverInterval) return;
      // Only stop if we actually left the card (not just moved between children)
      if (card.contains(e.relatedTarget)) return;
      clearInterval(card._hoverInterval);
      card._hoverInterval = null;
      const img = card.querySelector('.thumb-wrap img');
      if (img && card._origSrc) img.src = card._origSrc;
    });
  }

  // ── Refresh fab long-press menu ──
  const fabRefresh = document.getElementById('fabRefresh');
  let _fabTimer = null;
  let _fabTriggered = false;

  fabRefresh.addEventListener('touchstart', () => {
    _fabTriggered = false;
    _fabTimer = setTimeout(() => {
      _fabTriggered = true;
      showFabMenu();
    }, 500);
  }, { passive: true });
  fabRefresh.addEventListener('touchmove', () => clearTimeout(_fabTimer));
  fabRefresh.addEventListener('touchend', (e) => {
    clearTimeout(_fabTimer);
    if (_fabTriggered) e.preventDefault();
  });
  fabRefresh.addEventListener('click', (e) => {
    if (_fabTriggered) { e.stopPropagation(); _fabTriggered = false; }
  }, true);

  function showFabMenu() {
    const old = document.getElementById('fabMenu');
    if (old) { old.remove(); return; }
    const rect = fabRefresh.getBoundingClientRect();
    const menu = document.createElement('div');
    menu.id = 'fabMenu';
    menu.style.cssText = `position:fixed;bottom:${window.innerHeight - rect.top + 4}px;right:16px;z-index:300;background:var(--bg);border:1px solid var(--border);min-width:160px;`;
    menu.innerHTML = `
      <button class="secret-menu-item" onclick="switchTab('home')">Home</button>
      <button class="secret-menu-item" onclick="switchTab('live')">Live</button>
      <button class="secret-menu-item" onclick="switchTab('history')">History</button>
    `;
    document.body.appendChild(menu);
    setTimeout(() => {
      const close = (e) => {
        if (!document.getElementById('fabMenu') || !e.target.closest('#fabMenu')) {
          menu.remove();
          document.removeEventListener('click', close);
        }
      };
      document.addEventListener('click', close);
    }, 100);
  }

  window.switchTab = function(tab) {
    document.getElementById('fabMenu')?.remove();
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tab[data-tab="${tab}"]`)?.classList.add('active');
    currentTab = tab;
    input.value = '';
    clearBtn.classList.remove('visible');
    currentQuery = '';
    nextPageToken = null;
    if (tab === 'history') loadHistory();
    else if (tab === 'live') loadLive();
    else loadHome(true);
    window.scrollTo(0, 0);
  };

  // ── Volume area ──
  const volArea = document.getElementById('volArea');
  const volFill = document.getElementById('volFill');
  const volLabel = document.getElementById('volLabel');
  let _volCurrent = 50;

  function updateVolVisual(vol) {
    _volCurrent = vol;
    volFill.style.height = vol + '%';
    volLabel.textContent = Math.round(vol) + '%';
  }

  function volFromY(e) {
    const rect = volArea.getBoundingClientRect();
    const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    return Math.round(Math.max(0, Math.min(100, (1 - y / rect.height) * 100)));
  }

  volArea.addEventListener('mousedown', (e) => {
    const vol = volFromY(e);
    updateVolVisual(vol);
    setVolume(vol);
    const onMove = (e) => { const v = volFromY(e); updateVolVisual(v); setVolume(v); };
    const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  volArea.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const vol = volFromY(e);
    updateVolVisual(vol);
    setVolume(vol);
  });

  volArea.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const vol = volFromY(e);
    updateVolVisual(vol);
    setVolume(vol);
  });

  // Sync visual on menu open
  const secretMenuEl = document.getElementById('secretMenu');
  const volObserver = new MutationObserver(() => {
    if (secretMenuEl.classList.contains('open')) {
      fetch('/api/volume').then(r => r.json()).then(d => updateVolVisual(d.volume)).catch(() => {});
    }
  });
  volObserver.observe(secretMenuEl, { attributes: true, attributeFilter: ['class'] });

  // ── Secret menu ──
  window.refreshFeed = function() {
    document.getElementById('secretMenu').classList.remove('open');
    if (currentTab === 'home') loadHome(true);
    else if (currentTab === 'live') loadLive();
    else if (currentTab === 'history') loadHistory();
    showToast('Refreshing...');
  };

  window.toggleResolution = async function() {
    document.getElementById('secretMenu').classList.remove('open');
    try {
      await fetch('/api/toggle-resolution', { method: 'POST' });
      showToast('Resolution toggled');
    } catch { showToast('Failed'); }
  };

  document.addEventListener('click', (e) => {
    const menu = document.getElementById('secretMenu');
    if (menu.classList.contains('open') && !e.target.closest('.logo-text') && !e.target.closest('.secret-menu') && !e.target.closest('.fab-top')) {
      menu.classList.remove('open');
      const pp = document.getElementById('phonePlayer');
      if (pp) pp.style.display = '';
    }
  });


  // ── Init ──
  checkAuth().then(() => loadHome());
  startPolling();

  // Auto-reload when files change (only when tab visible)
  let _reloadVer = 0;
  setInterval(async () => {
    if (document.hidden) return;
    try {
      const r = await fetch('/api/version');
      const d = await r.json();
      if (_reloadVer && d.ts !== _reloadVer) location.reload();
      _reloadVer = d.ts;
    } catch {}
  }, 5000);
</script>
</body>
</html>
